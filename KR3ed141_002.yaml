子四兩黑豆一鍾同炒後入香白芷五分胡椒一歲一粒再微炒淬入壇酒一壺去渣溫服如時酒加砂仁五分一方用霜後韭菜子炒為末每二錢食前酒調服一方治失精漏泄久虛用蓮子心一撮辰砂一分為末每服二錢空心白湯調下一方治失精暫睡即泄用白龍骨一兩韭子一合為末每二錢空心酒調服一方治夢遺精滑用牡蠣砂鍋煅醋淬七次為末醋糊為丸如梧桐子大每空心鹽酒下一方治男女夢與鬼交心神恍惚者刮鹿角屑一撮酒調一日二服淋證五淋有熱屬膀胱小便淋漓痛難當氣砂血膏勞五淋疏通清熱是良方治血淋血下升數痛疼不可忍用槐子炒去火毒為末每服一兩好酒送下一方治血淋用乾柿餅燒存性米飲調下一方治房勞過傷小便尿血用自己頭髮一撮洗淨燒灰作一服酒調下一方治小便尿血用胡椒一歲一粒生搗細研茶調新汲水服一方治小便淋血或出砂膏如條其痛如刀割用真麝五分蔥白一根搗取汁孩兒茶三錢半琥珀二分半各為細末用百沸湯調前藥入蔥汁同服空心如神一方治砂淋用竹葉煎水澄去葉下小米煮粥將柿餅燒存性為末攪入粥內服之外用醬瓜下粥一方治五淋並小便不通用硝石生研為末每服二錢卒患諸淋空心冷水送下勞淋勞倦虛損即發用葵子湯化下通後須服補藥血淋熱淋井花水化下小便不通小麥湯化下一方治小便出血條痛不可忍淡豆豉一撮煎湯溫服甚效小便閉小便不通有五閉氣血痰熱風者是悉宜用吐把氣提上竅既通下竅利治心腎有熱小便不通並血淋尿血用車前草不拘多少連根帶葉搗取自然汁入蜜少許同煎服一方治小便不通用孩兒茶為末每一錢扁竹根煎湯調服一方用田螺大者一二枚以鹽一匕連殼生搗搭臍中以布縛住一方以白礬末一匕安臍中冷水滴之冷透腹中即通一方用豬膽連汁籠住小便少時汁入自通一方治小便不出胞轉膨滿欲死者用發灰二錢滑石末一錢桃白皮煎湯調下一方治小便不通用蔥白切炒熟包帛內更尉臍即通一方治小便不通百方不效用琴絃半寸打一疙瘩慢慢送入小便內直入里拔出見膿血遂通大便閉大便不通有虛實陰結陽結閉不一或攻或補用溫涼臨時對症無差失治大便閉結用蜜一盞入芒硝二錢滾湯調空心服一方用粟米水煮熟入火麻仁微炒不拘多少入粥再煮一二沸飲湯一方用竹管蘸蔥汁深入大便內以香油一大半溫水一半同入豬尿胞內捻入竹管將病人倒放腳向上半時即順立即通一法用豬膽入醋竹管加上法套之一方用蘿蔔子一合擂冷水調皂角灰末每服二錢三錢服即通一方用黑醜半生半炒為末每服二錢薑湯調下熱茶亦可一方治大小便不通用鼠糞一個燒灰存性為末每服一錢黃酒調下一方用牙皂燒存性為末空心米飲或酒調下三錢立通一方用荊芥大黃各為末如小便不通荊七黃三如大便不通荊三黃七大小便俱不通各五錢水調服痔漏痔漏名有二十四酒色氣風食五事未破名痔破為漏祛風除濕解毒治治痔漏用馬齒菜入花椒同煎水洗三五次即效一方治痔漏坐板瘡大便一切諸瘡用五倍子炒一兩白楝子八錢水煮五六滾先熏後洗一方洗痔用山楂水煎先熏後洗以山楂肉為末貼之不過三五次全好一方用黑礬皮硝滾水泡先熏後洗一方用芒硝二兩自己小便二碗同煎至一碗頻頻洗之一方用刺刺芽濃煎水先熏後洗又方治痔瘡坐臥不得諸藥不效惟此藥極妙登時一點即好用大田螺八九個針破頂蓋入白礬末少許置地上尖底埋土中其頂蓋仰經一宿次日取蓋上水汁以雞翎搽瘡上五七次止痛即消一方用血竭為末敷之立止一方治痔漏臥床策杖方能移步者用旱蓮草一把連須先洗淨搗爛如泥極熱酒一盞衝入飲之將渣搗爛敷患處重者不過三服一方用牡蠣二兩煅過入地挖坑埋之去火毒為細末濕則乾摻干則以津調搽一方治痔瘡用活蜈蚣一二條置於磁器內用真麻油一二盞浸過封閉數月啓看肉化頗有氣息用手塗入瘡內不多日即愈一方治痔漏不論新久服之斷根用魚鰾廣膠舊椅棕灰各一兩前二味切碎用沙子同炒成珠去沙子將藥碾末柏子仁炒一兩四味末合一處每服三服空心黃酒調服一方治痔漏如神用白毛烏肉雞一隻皮硝四兩入鍋內連毛煮熟取出去毛將腸肚並毛入鍋內煮三四沸取出將水入桶內先熏後洗待水冷又燉熱再洗一日五七次將肉切碎上加皮硝四兩蒸熟空心任意食之一方治痔漏用大麻子棵一根切粗片水半桶煎數沸就桶盛坐在上熏之待溫洗二三次一方治痔漏用黃連四兩連翹槐子枳殼各一兩為末入豬大臟內煮熟搗為丸如緑豆大每五十丸空心黃酒送下一方治腸風痔漏臟毒亦能滋陰補弱用黃柏一斤分四份一份酥炙一份鹽水浸一份酒浸一份童便浸焙乾為細末以豬臟一條去筋膜裝藥煮爛同搗為丸如梧桐子大每服五六十丸空心好酒送下一方用槐花子三四兩沸湯米桶磁缸盛之赤身坐缸口以被圍之忌風腸澼腸澼即是大便血腸風糞全色鮮潔臟毒糞後血暗濁臟寒臟熱不同列治糞後紅及箭血痔用香油炒豬血入槐角槐花末同炒熟食之二三服一方治腸風下血用炒槐花荊芥穗等分為末酒調服一方治腸風下血用荸薺一斤用水煮熟食之一方治腸風下血痔血瀉利用川黃連一斤酒拌九蒸九曬為末阿膠水化為丸如梧桐子大每五七十丸空心米湯黃酒任下一方治腸風痔漏下血及婦人赤帶下血用側柏葉二兩砂鍋內用白礬蓋上入水平藥煮令水乾炒棕毛燒灰存性男用二兩女用三兩為末每服二錢半空心酒調服一方治腸風臟毒腸澼用乾柿餅燒存性為末每二錢米飲調下一方治大便下血如流水用黃連一兩金華酒下一服立止一方治腸風茱萸並黃連同炒不同研糞前用茱萸糞後用黃連酒送下脫肛脫肛氣虛寒脫下多因血痔久痢瀉治當補氣要升提清除濕熱效奔馬治腸出不收用生薑自然汁一合蜜一合和勻用雞翎掃上即收一方治脫肛用五倍子三錢白礬一塊水煎溫洗一方用蜘蛛七個燒存性為末少許香油調敷一方用白傷牛為末敷患處腋臭腋臭人聞不可言誰知子母亦相傳若還得遇仙方藥管取教君除卻根治腋臭用自己小便洗一次米泔洗二次自然薑汁一日擦十次一月後斷根一方用自唾以手指擦腋數遍以指甲去其垢隨用熱水洗手數遍十餘日痊愈一方用蜘蛛一個赤石脂末水和包蜘蛛在內封固炭火煅紅取出石脂不用將蜘蛛為末入麝少許油調成膏攤在厚紙上貼於兩腋下一方用白礬末入百草霜些須半月一次擦之半年除根諸蟲諸蟲多因濕熱生生於腹內狀難明上攻心腹痛還定或安或下便清寧治腹中諸蟲用檳榔十個石榴皮七片二指大二指長要近土與根及向東西方者二味切成片以水一大碗煎至八分露一宿患人於上半夜先將乾炒肉食在口中細嚼勿令咽下使蟲口俱朝上乃服藥少頃腹中微動蟲隨下若至後半夜服則蟲口又朝下雖服藥亦無效矣一方用黑醜頭末每三錢以豬肉四兩薄切搓藥末空腹食盡蟲即取下
