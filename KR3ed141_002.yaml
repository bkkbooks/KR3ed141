body:
  text: 卷二失血失血大抵俱是熱陽盛陰虛妄行血補陰清火抑其陽引血歸經血自歇治吐血咯血一切失血或痰嗽喘熱心慌用生地黃搗取汁童便各半盞入薑汁少許重湯煮溫服之一方治吐血衄血不止心慌喘急上壅或發熱用生地黃搗汁半斤生大黃末一方寸匕煎地黃汁一滾入大黃調勻空心溫服一小盞日三服血即止如發熱加童便一方治吐血不止用大黃酒拌九蒸九曬為末水丸每四五十丸白滾水下一方用側柏葉搗爛入童便二分酒一分溫服一方用玄參三錢童男童女溺各半盞同煎七分露一宿塞住鼻孔溫服一方治一切吐血及傷酒食飽低頭掬損吐血至多並血妄行口鼻俱出但聲未失者無有不效用百草霜為末每二三錢糯米煎湯下一方加白芷亦好鼻衄用少許搐鼻皮破並瘡出血摻上即止一方治吐血衄血或小便赤大便難併發煩熱惡寒心胃痛用山梔仁炒黑三錢生薑一片水煎溫服一方治嘔血吐痰心煩骨蒸熱者用人中黃為末每三錢用茜根汁竹瀝薑汁調服一方治血線迸流日夜不止將危用棕毛燒灰敷之立愈內用養血氣補之一方治鼻衄不止用蘿蔔自然汁和無灰黃酒飲之則止蓋血隨氣運轉氣有逆順所以妄行蘿蔔最下氣而消導之一服即效復患取人中白置新瓦上火逼干以溫湯調服即時血止人中白者即旋桶積鹼垢是也蓋秋石之類特不多用火力耳一方用小兒胎髮燒灰吹之一方用烏驢屎燒灰入發灰少許吹之一方用龍骨末吹入兼治九竅出血皆效一方用緑豆粉細茶各五錢為末冷水調服一方治鼻衄久不止素有熱而暴作者諸藥不效用大紙一張作八折或十折於水內濕置頂中以尉斗尉至一重或二重紙干立止一方治鼻血長流百方不效用金陵草片芩等分水煎服立止一方治鼻衄神法勿令患人知以井花水忽然猛噀其面即止一方如左鼻出血者以色線扎右手中指根右孔出血者扎左手中指根兩孔俱出者扎二指根出汗自汗陽虛白晝出盜汗陰虛睡覺沒自汗補陽盜補陰汗出油珠發潤卒治自汗盜汗用五倍子為末津液調塗臍內以絹帛縛定一宿即止又方用何首烏末亦可一方治遍身汗出不止用新桑葉乘露採摘控干研為末每服二錢空心米湯調服一方治別處無汗獨心孔一片有汗思慮多則汗出亦多病在心宜養心血以艾葉煎湯調茯苓末一錢服之一方治盜汗用牙豬心一個水二碗入砂鍋內煮爛熟為度去豬心不用另用當歸人參各二錢半入煮心汁內熬至上半甌去渣不拘時服豬心食否不拘一方治陰囊汗出用密陀僧研細加蛤粉撲患處一方治腳汗用白礬一兩水煎洗腳眩暈眩暈多屬痰與火六淫七情皆能作眼暗身轉及耳聾要分虛實方下藥治眩暈不可當皆痰上所致用大黃酒拌九蒸九曬水丸如梧桐子大每五七十丸白水下一方用枯礬為末薑湯調服一方治七情感動氣鬱生誕隨氣上衝頭目眩暈心嘈忪悸眉稜骨痛用大半夏湯泡七次切片每四錢生薑十片煎入沉香磨水一呷溫服癲狂癲為喜笑或不常安神養血是奇方狂為痰火因太盛平肝清火化痰良治癲狂不識人用伏龍肝末水調方寸匕日三服效一方用人糞燒灰每一錢酒調服一方治風邪用蛤蟆燒灰硃砂末等分每一錢水調服一方治風疾癲狂風癇婦人心風血邪用甘遂一錢堅實不蛀者為末用豬心取管血三條和遂末將心劈作四邊遂末入在內令線縛定外用皮紙裹慢火煨熟不可焦取末研細入辰砂末一錢和勻分作四丸每一丸將煨豬心煎湯化下大便下惡物效一方治發狂跳叫如著了鬼祟一般者用蠶退紙即蠶蛾拋子在上者燒灰存性溫酒調服一方治久心風癇氣血虛弱用紫河車焙為末煉蜜為丸酒送下五癇癇有五等類五畜以應五臟各斯屬卒僕搐搦吐痰涎祛痰順氣平肝木治風癇久服其涎自小便出用白礬細茶各一兩為末煉蜜丸如梧桐子大每三十丸茶下一方治諸癇用辰砂為末豬心血和勻以蒸餅裹劑蒸熟取出丸如梧桐子大每十丸臨臥人參湯下一方治豬羊癇風傾僕不省用紫河車一具男用男胎女用女胎薄酒洗淨入砂鍋水煮爛入鹽少許食之好酒送下一方治風癇年久病癲狂羊聲倒地不省人事或狂走持刃宜摧服伏邪蛇含石火煅九次醋淬至酥研令極細取狗膽汁丸如龍眼大發時用一粒人參煎湯磨下每日一服男子用雄女人用雌狗膽健忘健忘思慮損心脾盡力思量竟不知有始有終忘記事補脾養血是良醫治健忘用白茯神去皮木遠志用甘草水泡去骨取肉石菖蒲三味等分水煎服一日四五次久久服之能日誦千言名聰明湯也一方久服聰明益智用龍骨遠志制等分為末食後酒調方寸匕日三服邪祟邪祟難乾壯實人神虛氣弱致相侵只扶正氣虛邪退莫費工夫禱鬼神治妖魅貓鬼病人不肯言鬼用鹿角屑搗末以水調服方寸匕即言實也一方治百邪鬼魅用頭垢作丸一小豆大水吞服一方治中鬼氣死口鼻出血用雄黃末一錢煎桃葉湯調下一方治遠行所在有邪魅但至宿所望空書九龍符則壓諸邪魅精怪不敢動一方治百邪法常以雞鳴時心念四海神明三七遍可避諸邪惡鬼令人不病瘟疫如入病人室心念三遍尤好咒曰東海神阿明南海神祝融西海神巨乘北海神禹強一方出行不及擇選良辰須定心齊足正身作用先四縱後五橫以右手大拇指畫之咒曰吾今出行用兵禹王衛道蚩龍避兵起虎狼不得行周遊天下還歸故鄉擋吾者死避吾者昌吾奉九天玄女急急如律令敕不寐附驚悸不寐原來睡不寧膽虛痰氣沃心經治當溫膽生心血一枕黃梁夢不驚治膽虛睡臥不安心多驚悸用酸棗仁一兩炒香為末每二錢不拘時竹葉湯調下一方治夜不得寐用酸棗仁半兩炒研末酒三合取浸汁先以粳米三合煮作粥臨熟下酸棗汁更煮三五沸空心食之一方用遠志肉酸棗仁炒石蓮肉等分水煎服一方治被驚駭心神不安心跳不寧用豬心劈開入硃砂末於內紙包火煨熟食之頭痛頭痛須詳十二經各經用藥要分明頭腦盡痛手足冷此為真痛命當傾治一切頭痛用麥麩炒熟入好醋拌勻再炒乘熱縫袋盛之貼痛處外以手帕包裹被蓋出汗立止一方用生蘿蔔汁一蜆殼仰臥注鼻中左痛注左右痛注右一方治因氣惱衝動頭痛用香附二錢川芎一錢細茶一錢水煎服一方治年少強壯人氣實有痰或頭暈而重痛用大黃酒拌炒如此三次為細末清茶調服一方治偏頭痛耳中或左或右如抽筋痛者半邊頭疼是也用黃蠟一二兩放鐵勺內熔化將白紙蠟面上拖過如蠟紙樣每紙要闊二寸長五寸將真蘄艾揉軟攤蠟上以箸卷為筒插耳孔內一頭用火燃之令煙氣入耳內熱氣入腦內其痛即止再不發矣右邊疼插耳左邊左邊疼插耳右邊熏不過二次而已一方治頭疼不論偏正用南星川芎等分為細末用連須蔥搗成餅貼太陽穴手帕勒之鬚髮須屬腎兮發屬心肝經眉屬是其真腎水傷時須必白發皤還是損心神烏須用五倍子曲五線銅末二錢白礬一錢半食鹽一錢半沒食子二個麵炒黃色一錢半為末茶滷調重湯煮見黑色攤須勻自黑一方用杏仁不拘多少米醋浸七日曬乾砂鍋內慢火炒不可出煙令焦研末加潮腦少許用脂皮裹紙蘸藥捻鬚即黑一方烏鬚髮用燒包好鹽五分炒黑色黃丹一兩官粉五錢三味共為細末用熱鹼水調和勻掠掃鬚髮上待一炷香盡用水澆之一方用柏油四兩入瓶內將向南核桃樹根截去下半截上半截入瓶內封口以土埋之自冬至日埋至一百日取出染須一方用小蛤蟆屯一官鬥入好京墨半斤打碎同入壇內埋放人常走地內一年整取出研細末用手指蘸捻鬚上即黑一方用風化石灰潔白未化者一錢黑鉛炒成灰七分二味合和用鹽水和如膏塗水頻洗一方拔去白鬚即以銀簪點母丁香末和薑汁在根孔內則再生黑鬚來一方黑髭鬚用自己亂髮洗淨每一兩入椒五十粒泥封固入爐大火煅如黑糟研細酒服一錢匕一方烏須用石灰入水攪澄去渣將清水澄濾去水將紙一張蓋上將乾柴炭放紙上石灰即干用六錢官粉二錢緑豆粉二錢入水潤濕三味合一處水調勻塗須上紙包裹次日取出用香油捻鬚上須臾水洗去又少用香油捻之可烏一月一方用桑椹取汁入磁瓶以水養之候青核桃肥潤取汁好金墨一頂調勻作錠抹之可經半年一方用甘州地骨皮二斤白心蒼朮二斤搗爛粗羅過用桑椹二十斤取汁拌二藥濕了在日色曬七七四十九日用磁盆曬曬完煉蜜為丸如杏大每日服一丸煎鹽湯清晨服可使鬚髮白重黑牙重生且延壽耳病耳聾男右因色欲女人左聾緣忿怒左右俱聾厚味傷補虛順氣痰除去治耳聾用蔥葉一根入蚯蚓一條頭向上入麝少許鹽一捻須臾化水滴一二珠入耳孔內立通一方治耳聾因腎虛所致十年者一服而愈用全蠍至小者四十九枚生薑如蠍大四十九片二件銅器內炒至生薑干為度作一服初夜溫酒下至二更儘量飲醉不妨次日耳如竺簧即效一方以酒煎前藥送下六味地黃丸一百治耳鳴效一方治耳聾用九節菖蒲為末入萆麻子為膏如鼠糞大綿裹塞耳中一方用麝香一分斑蝥一雙為細末蜜丸緑豆大以絲綿包裹塞耳如熱取出即通一方治氣道壅塞兩耳聾瞶用甘遂半寸綿裹塞兩耳中即將甘草口噙下自通一方用老蔥白一寸塞兩耳頻易即通一方治耳內有膿痛不可忍用抱雞卵殼炒黃為末香油調灌耳內即時疼止一方治耳膿疼痛或出水用枯礬末吹之一方治耵耳俗云耳底膿出用五倍子燒存性為末吹耳一方治諸蟲入耳用香油滴入耳中其蟲自出或死於耳內或用驢牛乳或雞冠血滴入皆好不若用生薑擦貓鼻其尿自出滴耳內蟲即出一方治凍耳用橄欖燒灰存性清油調敷雀腦亦可如耳爛用貝母末乾摻鼻病鼻窒不聞臭與香素常痰火肺間藏每遇風寒必便塞清金降火最為良治鼻塞不通用菖蒲皂角等分為末每一錢綿裹塞鼻內仰臥少頃效一方治老人鼻流清涕不幹用獨蒜四五個搗如泥貼腳底心下用紙貼之其清涕再不發一方治久患鼻瘡膿極臭者用百草霜研細每服三錢冷水調服一方治甕鼻塞肉乃肺氣盛用枯礬末綿裹塞鼻中數日自清一方治甕鼻用雄黃甜瓜蒂為末吹之外用雄黃磨圓入鼻內塞之外用椿姑姑為末每服二錢臨臥黃酒調服一方治鼻中肉贅用藕節有毛處一節燒灰存性為末吹患處一方治鼻紅如神用硫黃化開入好燒酒內淬三次為末用茄汁調敷三次效一方治鼻塞不通或流清涕用牙皂末每一匙臨臥黃酒調服忌風出微汗口舌口舌生瘡心臟熱涼劑徐投火自滅口舌肝熱移於膽此因謀慮而不決治口瘡並疳及喉痛用甘草白礬為末摻口內一方用白礬一錢蜜調塗瘡上一方用西瓜漿水徐徐飲之無瓜時以瓜皮燒灰敷之一方用黃連煮汁呷之即已一方治白口瘡急惡狀似木耳用五倍子青黛等分為末好酒調搽瘡上咽瘡吹入喉中有津吐出一方治口臭用白礬麝香為末擦牙上一方治口氣用香白芷七錢甘草五寸為末每一錢食後井花水調下一方治舌腫大塞口不通飲食用蒲黃末頻摻舌上內以黃連煎湯服以瀉心火一方治被人咬去舌尖用鹽一大把入口淹舌頭一夜即長如舊一方治口瘡用熱水半碗入白礬一撮待溫漱口數回而已牙齒牙痛濕熱有胃火有風有蟲痛非可清火除濕更誅蟲或搽或服皆安妥治一切牙疼用鹼炒為末每少許擦牙立止一方用白蒺藜不拘多少噙漱吐出一方用燒酒煎漱亦可一方用蛇床子煎水漱一方用小麥炒焦燒酒淬入口噙漱吐出一方治蟲牙痛用雄黃一錢末井花水調漱痛處覺熱吐