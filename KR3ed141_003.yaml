body:
  text: 卷三婦人婦人屬陰多生氣氣鬱成病最難治諸病兼理氣調經香附是女真仙劑治婦人百病用香附米一斤分作四制一用鹽水加薑汁浸透煮略炒主降痰用下部血一用米醋浸透煮熟略炒主斂氣補血一用山梔仁四兩同炒去梔子不用主降鬱火一用童便洗過不炒為末一方用芎歸各二兩為末酒煮麵糊為丸如梧桐子大每五七十丸隨引下經水不調用酒下胎前諸病艾湯下產後諸病芎歸湯下胸膈脹滿薑湯下頭暈荊芥薄荷入薑汁下白帶非冷乃自庚辛金來主忿氣所致用小茴湯或木香湯下其餘病者與男子同症隨意用引不能者只用白湯下治婦人胎前產後一切諸病用益母草於端午日或六月六日花正開時收採透風處陰乾不犯鐵器以石臼搗為末煉蜜為丸如彈子大每服一丸照後引下以病愈為度或丸如梧桐子大每五七十丸亦可或將益母草連根莖葉洗淨石臼內搗爛入水熬濃汁濾去渣再熬如黑砂糖色為度入磁器內收貯每服一二匙極妙胎前肚腹刺痛胎動不安下血不止水煎秦艽末湯或當歸湯亦可胎前產後臍腹作聲作痛或寒熱往來狀如瘧疾者俱溫米湯下臨產併產後各先用一丸童便酒化下安魂定魄血氣自然調順諸疾不生又能破血養脈息調經絡產後胎衣不下落在胞中及產前一切產難橫生不順死胎經日不下滿腹中心悶心痛炒鹽湯下產後中風牙關緊急半身不遂失音不語童便黃酒各半下產後氣喘咳嗽胸膈不利噁心口吐酸水面目浮腫兩脅疼痛舉動失力者溫酒下產後兩太陽痛呵欠心忪氣短肌體羸瘦不思飲食血風身熱身足頑麻百節疼痛溫米湯下產後眼前黑暗血暈血熱口渴煩悶如見鬼神狂言不省人事薄荷湯或童便和酒下產後面垢顏赤五心煩熱或結成血塊臍腹奔痛時發寒熱有冷汗者童便和酒下或薄荷湯下產後血瘀惡露不盡結滯腹臍刺痛惡物上衝心胸滿悶童便和酒下產後未經月滿血氣不通咳嗽四肢無力臨睡自汗不止月經不調久而不治則為骨蒸之疾童便和酒下產後血衄口渴舌黑童便和酒下產後大小便不通煩躁口苦者薄荷湯下產後痢疾米湯下產後漏血棗湯下產後赤白帶下膠艾湯下血崩漏下糯米湯下勒奶痛或成癰為末水調塗乳上則一宿自瘥或生搗爛敷上亦可婦人久無子息溫酒下一丸服至一月決有效驗經閉月水緣何久不通蓋因血少血凝壅或補或瀉兼調氣慎勿巴黃一樣攻治婦人經血逆行或血暈或吐血或咳血用韭菜搗汁服之一方治室女經閉不通用雄鼠糞一頭尖者是燒存性為末每一錢空心溫酒調下一方治婦女經閉不通用托盤科一兩歸尾赤芍桃仁各一錢紅花五分黃酒煎空心服汗出至足為效一方治經閉並乾血氣用斑蝥二十個糯米炒大黃五錢桃仁四十九個炒為末酒糊丸如梧桐子大空心酒下五七丸甚者十五丸如血枯經閉者用四物湯送下一方治婦人經閉不通咳嗽發熱面紅虛勞盜汗痰喘用滋補之藥不效危困之甚用大黃酒拌九蒸九曬四兩血竭沒藥各五錢為末水丸每五七十丸用四物湯加紅花煎湯送下一方治婦女月經不通用生蒲黃三錢乾漆炒為末三錢共六錢紅花煎酒調服立通崩漏崩漏虛溜熱則通陰虛陽搏謂之崩更有冷熱並虛實辨得陰陽藥自靈治血崩用刺刺芽搗汁半碗熱酒半碗合而溫服一方治血崩不止如神用天靈蓋燒存性為末每二錢空心黃酒調下一方用何首烏切一兩甘草些須黃酒一碗煎至八分入刺刺芽汁一盞同服立止一方用棉子棕桐頭髮共燒存性百草霜同研為末每三錢空心酒調服一方用五靈脂炒盡煙為末每一錢溫酒調服一方半生半炒用一方用香附米炒黑為末每服三錢空心熱酒調服米飲亦可一方治血崩屬熱者用條芩為末每服一錢霹靂酒調下一方治血崩不進飲食或作嘔吐不止者用生薑五兩搗汁露一宿次早溫服一方治血崩不問遠近如神白炭搗為末每服三錢如黃酒送下帶下帶下多緣下部虛濕痰滲下亦如之治宜實下兼清上養血和脾帶自除治赤白帶下用五倍子炒桃仁去皮尖等分為末燒酒調服一方用鹿角燒灰存性為末每二匙空心好酒調下一方用黃荊子炒為末米飲調服以能燥濕痰也上可治心痛一方用硫黃五錢為末烏梅肉三錢搗丸黃豆大每五丸空心酒下一方用白芍三兩乾薑五錢炒為末每二錢空心米飲調下一方用蕎麥麵不拘多少雞子清為丸每三五十丸白湯下一方用白葵花陰乾為末黃酒送下種子人生無後實堪傷誰識仙翁有秘方只在心田存一點管教蘭桂滿庭芳治婦人經水不調久無子息用南香附米一斤用童便浸透取出水洗淨露一宿曬乾再浸再露再曬如此三次用好醋浸透過露而曬乾為末用益母草十二兩東流水洗淨烘乾為末復用生香附四兩北艾一兩煮汁三份醋七份將前二藥合和為丸如梧桐子大每服五七十丸空心臨臥淡醋湯下一方治婦人下寒久不生育用胡椒杏仁核桃蜂蜜搗爛用磁罐一個以紙封固用繩繫緊用竹箭一條插封瓶紙中間以通其氣放瓶於鍋內煮一飯熟為度取起每日清晨用熱酒服三匙睡一覺起久服下元溫暖自然有孕一方治婦人下寒子宮久冷赤白帶下崩漏不止久不受孕用雞子不拘多少每頂開入硫黃研末三分在內攪勻用濕紙包裹慢火煨熟嚼吃溫酒送下凡人無子多是男子元陽虛損不能直射子宮用山公羊尾連腰子及骨肉斫下一具約有三斤用淫羊藿五兩共入好燒酒一金華壇內文武火煮一晝夜將肉煮化埋土中一晝夜出火毒濾去骨渣每早晨服三鍾興陽生子一方治男子諸虛百損五勞七傷暖丹田添精髓壯元陽滋腎水蓋陽壯則能直射子宮種子之仙方也用菟絲子不拘多少酒洗淨蒸一晝夜用好酒時時灑之蒸爛取出搗成餅焙乾為細末用雀卵清為丸如梧桐子大每七十丸空心好酒送下此大司寇三川劉公屢驗之方賢每用於年至五十及陽痿者每菟絲子末一斤加天雄四兩以麵裹火煅熟去面削去皮臍切四片童便浸透慢火焙乾入菟絲子末同丸服之尤效一方暖丹田助兩腎添精補髓卻病久固返者還童益壽生子用大附子重一兩二錢一個或一兩六錢尤佳切作薄片苧布包定用甘草甘遂各一兩俱銼以燒酒二斤共浸半日文武火煮酒干為度取起附子其二甘不用加麝香三分搗研作二丸陰乾以一丸納臍中七日一換一丸於黑鉛盒內養之輪換更用妊娠妊娠母病致胎動母病醫痊胎自和胎若不安觸母病但安胎氣母無疴治婦人懷胎每至三月必墮不肯服藥用老母雞煮湯入紅谷小黃米煮粥食之一方治胎氣動不安用鯉魚一個煮熟並湯食之一方治孕婦三四個月小腹痛不可忍者用紅棗二十個燒存性鹽一錢煅白色每用一撮好酒調服一方治妊娠卒胎動腰痛或轉搶心或血不止用艾葉如雞子大一塊酒四升煮一升分作二服或用醋煎亦可治妊娠胎動下血不止心腹脹滿用歸尾南芎各五錢酒煎入童便服之登時效治妊娠腰痛狀不可忍用破故紙炒香為末嚼胡桃肉半個每二錢空心溫酒調服治妊娠兩三月胎動不安防其欲墮預服之或素慣墮者用杜仲薑汁炒續斷酒浸為末棗肉為丸如梧桐子大每三十丸米飲下忌醋一方治因火動胎逆上作喘急者用條芩香附為末調服一方治妊娠傷寒恐致墮胎用伏龍肝為末溫酒調塗臍上一日一換七日之後不墮一方治妊娠瘧疾用帶皮老生薑取自然汁用紗帛蓋定一宿發日天將明時分攪勻頓服一方治兒在腹中哭用多年空房下鼠穴中土一塊令孕婦噙之即止探胎方知過月難明有無如月數未足亦難明用好醋炆艾服半盞後腹中翻大痛是有孕不痛定無一方治婦人虛羸有鬼胎癥塊經候不通用芫花根三兩炒黃色為末每服一錢桃仁煎湯調下當下惡物神效產育臨產之婦勿驚惶行動頻頻莫臥床瓜熟須知蒂自落若還用藥要安詳治難產用蜜香油黃酒各一鍾合一處煎熱產婦面朝東服一方用頭髮燒灰每一錢黃酒調服一方用魚膠七寸麻油燈上燒過為末黃酒調下一方用新人糞淘洗內揀豆一粒劈開一片書父入一片書子出再合豆水吞下一方先脫產婦常著衣一件蓋灶頭免胎衣不下之厄一方偷剪鍾馗左腳燒灰水下一方用左腳舊草鞋洗淨燒灰三錢水下一方治橫逆手足先出以其父名書兒足即順生一方治橫生逆產皆因坐草太早努力過多兒轉未逮或已破水其血必干用白芷百草霜等分為末每二錢童便和酒下一方下死胎用朴硝二錢溫童便調下一方治橫逆不順子死腹中者用伏龍肝為細末每二錢溫酒調下其兒帶土而下一方治胎衣不下用蔥白數根生嚼吃即下一方令產婦口銜自己髮尾於口中令嘔噦衣即下一方治難產用紅蓖麻去皮搗爛抹婦人手中燒香過四寸即下急使溫水洗蓖麻恐墮下子腸一方治橫生者亦用紅蓖麻搗爛攤紙上貼在婦人囟門上點香三寸兒順過急去蓖麻溫水洗淨仍抹在手心照前點香即生兒生下先洗蓖麻恐墮子腸產後產後諸疾要扶虛惡露流通是所宜更有多般發熱證未可輕教汗下醫凡產後不問有病無病即用童便半鍾好酒半鍾合而溫服即百病不生一方治產後惡露不盡攻衝心腹疼痛或作眩暈或寒熱交攻用益母草銼一大劑童便黃酒各半鍾煎溫服一方治產後攻心語言顛倒健忘失志及打撲傷損一切敗血為病用血竭沒藥等分為末每二錢童便好酒各半盞調服其惡血即下行而愈一方治產後血暈用韭菜細切盛於有嘴瓶內上以熱醋沃之急封瓶口以瓶嘴納產婦鼻中搐之即醒一方用舊漆器燒煙燻之一用荊芥穗研末吹鼻中一方治產後血大下不止用蒲黃炒黑每二錢用芎歸煎湯調下一方治產後小腹作痛諸藥不效及吹乳乳癰痛不可忍用螃蟹一個燒存性研末空心好酒一盞調服即止生男用尖臍生女用圓臍蟹一方治產後角弓風反張四肢搐搦用荊芥穗為末每服二錢好酒調下一方治產後血暈心悶恍惚如見鬼用益母草汁三合生地黃汁二合童便一合雞子清三枚煎三四沸入雞清攪勻作一服一方治產後閉結膨脹不通氣急坐臥不安用麥蘖末一合酒調服立通一方治產後血暈迷悶用五靈脂半生半炒為末每服三錢熟水下如口噤以尺斡開灌之乳病乳汁不通有兩樣血氣有衰有盛壯壯者宜行衰宜補吹乳乳癰要通暢蟠桃酒返經為乳治乳汁不通用王不留行川山甲酥炙豬蹄筋膜要七孔前蹄三味為末用酒或煎服其蟠桃即升日進三服若要降用胡蘆巴酒服之即降一方治婦人少乳用川山甲燒存性研末每二錢空心熱酒調下一方治乳汁不行用桃仁二十個去皮淨搗爛入川山甲末一錢黃酒服一方治乳汁不通用木通川山甲土炒等分為末每二錢通草煎湯調服一方治吹乳如左乳用本婦人頭上所帶之簪一根插於右床足下即消一方用蔥白切爛炒熟帛包熨乳上冷則易之一方用茄子花燒灰油調搽即消一方用端午棕葉燒灰酒調服一方治吹乳用鹿角燒灰為末每三錢好黃酒調服小兒小兒十病九傷食食傷發熱成諸疾早當消導莫遲捱免致驚疳痰熱積治小兒百病用好硃砂研爛入去殼巴豆同研極細再入寒食麵等分酒打成糕入藥仍同研百餘下揉丸如黍米大所服量兒大小不過三五七粒而以利為度如感冒風寒薑蔥湯下內傷飲食茶清下心疼艾醋湯下肚腹痛薑湯下霍亂吐瀉薑湯下痢疾茶下瘧疾薑蔥湯下急慢驚風薄荷湯下一切病茶下此仙方也不可輕視用端午日製要誠心潔淨之所忌婦人雞犬見之其功不能盡述驚風急慢驚風證不同慢宜溫補