一分用硃砂以麻黃煮過一錢共為末每服五七分或一錢溫酒調下痘瘡結痂已盡忽又倒發用好雄黃二錢為末黃酒半碗煎滾待溫用綿帛蘸藥塗患處三五次即消痘後風以患兒男左女右手中指以杆心比三節一般長放額中與眉梢相平比至上杆心盡處是穴艾灸三壯或五壯如神無價散治小兒癍疹痘不出陷者欲死也用人貓豬犬糞臘八日辰時收糞入瓦罐內燒灰存性上為細末每服一錢蜜湯調服量大小與之又無價散治初生小兒一歲以上三歲以下乳食沖肺風邪相感及生胎毛相急慢驚風發熱嗽喘潑痰涎壅服諸藥不效服此藥累驗硃砂五分珍珠九粒土牛犢在牆下尋瓦上焙乾一錢上研細末每服一分或二分井花水送下立止不拘時服癰疽癰疽發背氣凝起先宜敗毒後托裡高起屬陽陷屬陰陽輕陰重費調理治發背癰一切毒腫用白礬末二錢溫酒調服外用五倍子炒為末醋調貼患處一方治發背癰疽無名腫毒用豬膽一枚傾磁器內入蜜二兩和勻量瘡大小以面圈之用蔥搗攤上然後用茶匙挑膽蜜於瘡上不一時立消一方用鱉甲燒存性為末干則香油調搽濕則乾摻一方用乾薑末豬膽汁調搽一方用胡椒生蜜和塗其冷如冰一方治發背痛欲死者用伏龍肝末以酒調敷患處如干則易不日平復一方發背痛不可忍用蕎麵蔥蜜搗塗瘡上立止一方治發背用人糞燒存性為末醋和塗之干則易效一方治發背已爛用蓖麻子一合研爛蠟糟一鍾煎成膏先將米泔洗瘡令淨用雞翎陸續掃上其皮即皺其肉即消一方用香油一兩半入雞子一個煎至胡色待溫入乳香沒藥孩兒茶末等分入內米泔洗瘡令淨雞翎藥掃上一方治發背及一切疔瘡腫毒乳癰便毒不問已成未成痛不可忍者用槐花微炒大劑入酒煎服或金銀花如上煎服俱效一方治發背初輕者用活蛤蟆一個放瘡上頓飯時取下入水又易一個如此三五個其瘡必敗瘰癧瘰癧相連頸項生虛勞氣鬱結其形益氣養榮並解鬱內消方顯藥通靈治瘰癧內消用蜈蚣不拘多少瓦焙為末用銀杏汁為丸如黍米大每服十丸鹽湯送下外將被蓋出汗服數次而愈一方用斑蝥一個去翅足用粟米一升同炒令米焦黃去米不用將蝥細研入干薄荷末四兩研勻以烏雞子清丸如綠豆大每一丸空心茶下加至五丸減每日卻一丸減至一丸後每日服五丸效一方治瘰癧未破者用雄黃地龍糞小麥面等分研末醋調塗之一方治瘰癧已破者用銀硃一錢銅青一錢松香五分三味研末如有水干敷之如干香油調搽一方治瘰癧潰爛不愈者用貓頭一個燒存性為末香油調搽一方治老鼠瘡用靛葉以手揉軟貼之頻易一方治瘰癧用藥皆消惟一二個不消者用癩蛤蟆一個剝取皮蓋瘡上灸七壯立消一方治瘰癧用斑蝥一錢糯米同炒黃色去米五靈脂炒四錢共為末食後黃酒調下壯者一錢弱人五分又方治魚口未破及婦人閉經不通空心服疔瘡疔瘡名有十三種皆由熱毒及邪風外宜刺破敷其藥發汗須交毒外攻治疔瘡腫毒用白芷為末每五錢黃酒調服一方用芭蕉根研生酒吃一方治疔瘡用大蜘蛛一個放瘡上令自咂其毒連易三五個其毒自敗以蛛入水不傷蛛命一方用螞蝗一個放竹筒內頭朝外置於瘡頭上咂待螞蝗腹大取下入水又易一個不過三四個即愈一方治疔瘡發背括曰發背疔瘡識者稀醋磨京墨繞四圍生薑豬膽同塗上天明卻似鬼神移一方端午日蛤蟆含墨法蛤蟆本是水中串五月端午拿將來口含黑墨梁上吊含的黑墨化歹瘡此咒含墨時念一方治疔腫用葶藶子為末雞清調搽一方治頸以上及頭面上惡毒疔瘡用蒼耳子一兩馬勃三錢作一劑無灰酒煎至七分食後不過二服一方治疔瘡惡毒用紫花地丁一大劑水煎熱服一方治疔瘡腫毒危急欲死者搗菊花葉敷上即蘇冬月無葉用根亦可一方治食災牛馬肉成疔瘡欲死者用烏桕木葉搗絞取汁一二碗頓服之得大瀉毒氣而愈如冬月無葉取嫩根研水服之亦效以利為度一方治誤食瘟牛肉生疔毒瘡用白頸蚯蚓八九條擂酒濾食其渣貼在四圍患處可留頂出氣便毒附魚口瘡便毒生於兩腿間敗精摶血聚中關寒熱交爭疼痛腫急宜敗毒瀉膿安治便毒初作者用大黃三粒枯礬一錢為末好酒調服日久加川山甲炒一錢一方用雞子一個頂上打一小孔將紅娘子六個裝入內紙包水濕煨熱去娘子只食雞子酒送下食後小便多小便內痛尿出或膿或血立愈先用湯洗浴後服雞子為妙一方治疳瘡初愈便毒復生用白礬一錢半生半枯為末好酒調服儘量飲之發汗汗如油針刺患處一方治便毒用大蜘蛛一個舂爛用生白酒泡服一方用鹿角燒灰三錢核桃干皮燒灰三錢共一處無灰好酒下一方用魚膠熬化攤在樺皮上貼患處一方治魚口瘡初起用槐子七錢炒黃酒煎熱服出汗為度此方經驗一方治魚口瘡初出三五日用五倍子炒為末入百草霜醋調貼患處一日夜即消一方治魚口方用牛皮膠一兩切川山甲三枚切炒成珠好酒煎空心熱服一方用瓣蒜一頭要獨的搗爛魚鰾二寸熔化共為一處剪紅絹一塊攤藥先將米水洗淨膿血貼藥留口如緊痛以溫水潤之立消一方治腿便疙瘩一名橫痃用生山藥砂糖同搗塗上即消先用面塗四圍敷藥疳瘡下疳生瘡在玉莖只緣交接不乾淨邪毒浸漬發成瘡先洗後敷方有應治下疳瘡先用黃柏煎湯洗淨或甘草煎頻頻洗之後用天靈蓋燒存性為末摻患處一方用黃柏以豬膽汁塗炙白頸蚯蚓一條焙乾為末香油調搽一方用輕粉細研乾摻之即結干靨而愈一方用孩子茶鏡鏽等分研末摻上一方用五倍子燒存性為末摻上一方用黃連黃柏輕粉等分為末茶洗敷上楊梅瘡楊梅一名廣東瘡先宜發出後無傷毒出方服遺糧藥免教筋骨痛難當治楊梅天泡諸瘡用香油二斤入水一盞煎至白煙起收貯每用黃酒一鍾入油一盞溫服每日服三次服盡痊愈一方治楊梅瘡初起擦法用白礬四兩研為細末令患者坐重幃中擦手足心少少細擦以盡為度七日汗出不止為愈一方用鴨一隻餓二日只與白水食之用輕粉一兩大米飯四兩拌勻餵鴨待吃盡以葦根槌碎泡水令鴨飲之解去輕粉之毒待鴨毛落盡煮鴨食之一方用小蛇一條斬令碎爛將母雞一隻罩住餓一日夜放出令食蛇肉待食盡罩放淨地上令撒下雞糞收放缸瓦上煅過存性每用一分作三釐稱之先三釐治頭上中三釐治身中末三釐治腳下燒酒調服百無所忌稱須記明白一方治楊梅瘡毒年久不愈用苦參連根帶葉摘下搗爛取汁和酒飲之一方治輕粉毒用川椒一斤黃土泥二斤為末棗肉為丸每百丸米湯下一方治楊梅筋骨痛用烏梅肉麩炒五錢硫黃五錢豆腐煮去油共為細末每一錢重者二錢好酒下一方治楊梅天泡服輕粉致筋骨疼痛用黑鉛一斤鍋內化開投入桑白皮炒成粉以黃酒淬入乘熱飲以醉為度臁瘡臁瘡濕毒兼風熱兩腳生瘡腫爛裂祛除濕熱更追蟲蔥椒湯洗後敷貼治臁瘡切生蘿蔔一大片纏定貼瘡上頻易之一方用枯礬末陳釅醋調敷一方用大黃末煎熟香油調搽一方用飛黃丹香油調油紙貼瘡上用藥夾紙貼之一方用干梨葉以醋浸透貼瘡一方治裡外臁瘡不拘年月遠近用川黃柏去粗皮蜜炙三五次為末先用蔥椒煎湯洗瘡令淨拭乾以真輕粉不拘多少細研入瘡口內按實卻將黃柏末調成膏貼瘡上用紅絹束之不可移動瘡痂自落一方用冬青葉與本人嚼爛先以蔥椒湯洗淨用臘月豬膽百草霜等分敷瘡上後卻敷以嚼葉在上三四次即可一方用五倍子炒研末敷上一方用香油一兩鐵勺煎入黃蠟五錢化開用銅綠三錢研極細末將銅錢摻末徐徐作五六十次入內將銅錢放碗底將藥傾入碗內令定將瘡洗淨用毯一塊如瘡大攤藥於上勒放患處一日一換換時要洗淨疥瘡疥癩濕熱小干瘡渾身瘙癢也難當殺蟲除濕追風毒須用神仙一掃光治諸瘡疥癩血風瘡用硫黃不拘多少人言少許入白蘿蔔內火燒存性取出研極細另用香油四兩入雞子三個煎熟去雞子不用再入花椒四兩油內煎至焦黑去椒不用用油調藥搽瘡上名一掃光也一方治血風疥癩用花椒炒陳小麥炒等分為末香油調搽一方用蒼朮皮硝煎水頻洗一方用牡蠣蛇床子硫黃白礬生等分為末豬油調搽一方用死蛇一條燒水澆之一方用茶葉花椒燒酒頻洗一方用枯礬二兩硫黃一兩信五分共為末干則香油調搽濕則乾摻一方用熱水一盆入石灰半碗攪渾待溫可下手洗疥如神癬瘡癬瘡原是因風毒濕熱相煎聚一處有時作癢痛難當用藥殺蟲使風去治一切頑癬用干驢糞燒灰乾用香油調搽濕用乾摻日三四次一方四塊風癬發癢流水用牛腳兒皮燒存性為末先抓破燒酒調搽立已一方治鵝掌風癬有蟲吃開用黃丹輕粉等分為末豬臟頭燒油調藥捺之一方用黑鉛不拘多少打成片熬至一炷香入綠豆一碗再煮豆爛濾去渣以水乘熱洗數次或搽亦可一方治風癬用棗三四枚去核用人言一錢入棗內將紙包灰火炮製燒過紙為度取為末同豬膽調搽一方用椿樹津合豬膽汁擦之一方用楮葉背上毛擦癬上禿瘡禿瘡頭上白如雪常時作癢抓出血有蟲有熱毒兼風用藥搽之自消滅治禿瘡先用退殺豬湯洗瘡淨用赤皮大蔥白三條長三寸劈開裝入皂礬每一條入礬一錢紙包火煨熟擦之一方用舊生鏽鐵鍋將坑中真大糞水入內熬三四滾將糞水頻洗瘡即癢令抓破再洗即愈一方用鯽魚一尾要一虎口長者去腸將黑礬七錢入魚腹內紙糊住火煅存性為細末用生柏油逐日調搽不過十日即愈癜風白癜紫癜一般風更有汗斑亦相同內服敗風丸散藥外將末劑擦其容治赤白癜用芝麻花同自己小水頻擦患處過半日洗去如失一方治癜風用雄雞腎白果仁搗爛擦之一方治汗斑用白蓮花半夏等分麵糊丸彈子大用六安細茶擦之一方治諸風瘡隱疹白紫癜風用端午日取蒼耳草葉洗淨曬乾為末煉蜜丸如梧桐子大每服四五十丸白湯下日三服若身體有風處或如麻豆粒此為風毒出也以針刺汁出盡乃止諸瘡一切無名腫毒瘡須臾腫起痛難當急將妙藥頻敷貼免使猖狂作禍殃治一切無名腫毒發背癰疽疔瘡用白礬不拘多少為末入新汲水內用粗紙三張浸內將一張搭患處頻頻更搭十數次立消一方用白及白斂各一兩枯礬五錢為末入水碗中即沉底外用桑白紙蘸水搭患處別用紙再換再搭待其患處冷定即頃去水用藥敷上立消一方用蔥頭杵爛炒熟敷患處冷則易之一方用五倍子炒末醋調敷患處一方用大黃末醋調敷患處一方用米蒿子研末雞子清調搽此四五月收子一方用花椒炒槐花炒白礬陳石灰等分用熱釅醋調搽一方治腫毒初發即飲熱香油一杯則毒不攻心可以緩治一方治腫毒發背一應惡瘡用端午日取白礬研末但遇瘡毒初起每三錢加蔥頭切拌勻好酒調服黃水瘡用松香不拘多少為末用紙卷藥在內搓成條以線縛住入香油內一浸取出火燃著滴藥入碗內取搽瘡上一方治面並兩頤生膿水黃瘡用官粉一兩水調用艾熏過黃色入煅過棗十枚為末敷上蛇頭指用雞子開一竅將指入內待蛋化水又換一個如此三枚而已膿疱瘡用硫黃一兩二錢焰硝一錢人言三錢三味共為末每用三分水一碗煎末藥鵝毛掃水於瘡上坐板瘡將初發之時極癢難忍用舊布鞋底炙熱搭癢處候癢住即止不過三次身惡瘡癩用地膚子半升煎湯頻浴愈下部濕熱腳瘡用大黃鬱金黃柏各二錢輕粉乳香沒藥各五分為末葵花油調搽附骨疽即貼骨瘤以面作圈圈瘡在內以蒜搗爛填滿上以槐皮一塊蓋之用大艾柱灸百壯內服槐花酒瘡癤後脹起惡肉不消用烏梅燒存性為末摻上立消久遠腫毒不能收口用桑葉醋煮貼之一切百毒諸瘡瘰癧痔漏臁瘡癰疽無名腫毒用荷葉燒灰存性不拘多少煎湯以氣熏蒸不可沾水沾之則不效矣一人頦下生瘡長二寸久不愈熏之愈薄皮瘡用甘草末作包浸水熨之杖瘡杖畢即用童便黃酒各一鍾合而溫服免血攻心甚妙即用蔥切爛炒熟搭患處冷則再易止痛消腫散瘀如神如無蔥用熟豆腐消在杖處其氣如蒸其腐即紫復易以淡為度一方用豬膽一枚傾出碗內將綠豆粉黃柏黃連細末入膽內調勻搽杖處一方治杖瘡並打傷皮不破而內損者用蘿蔔搗爛罨之一方治杖瘡打定痂者不用刀割用黃蒿子焙乾為末搽上即開如心慌者即飲童便一二碗一方治杖瘡用大黃末童便調敷一方治杖瘡用真綠豆粉微炒雞子清調刷之一方治杖生疔甲用玉簪花葉貼一二日即落嫩荷葉亦可貼杖瘡膏藥用密陀僧四兩為末香油八兩同入鍋內文武火熬用柳條數根一順勤攪不要住手待熬成黑色滴水成珠油紙貼患處當時疼止拘膿水自然生肉如有疔甲貼藥頑瘡天泡凍瘡一方治末打之先用切入碗內滾酒泡服打著不痛
