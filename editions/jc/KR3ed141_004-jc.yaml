body:
  text: 卷四折傷折傷打撲痛難禁瘀血停留忽上心散瘀止痛須趁早補虛接骨慢搜尋凡打跌傷損即用童便黃酒各一鍾合而溫服一日三四次外用蔥切爛炒焦搭傷處冷則易一方用小嫩雛雞帶毛屎搗爛搭傷處先將所患處扯伸即用杉木板或柏板夾之一方治跌撲傷損惡血入腸胃下血濁如瘀血者用百草霜研細酒調下一方治撲傷折手足用綠豆粉新瓦銚內炒紫色旋汲井水調成稀膏厚敷損處須教遍滿貼以白紙將杉木板縛定此方驗過一方治被打傷重者用雄鴨彈一個不去皮黃苘麻燒灰黃酒調下一方治傷肢折臂斷筋損骨但有皮相連者用生地黃研汁好酒和服一月筋皮連續並杵碎炒熟封損處極效一方治打撲傷損骨蹉筋折用皮底燒存性每服三錢黃酒調服外用白及磨水調前末敷傷處效一方接骨消腫止痛用蘇木一兩好麻五錢炒成灰二味好酒煎熟用乳香沒藥各三錢為末入酒內碗合住片時溫服汗出效一方治不拘打傷刀砍跌損用松香為末撤患處即愈金瘡治破傷手足血出不止一時無藥用自己小便淋傷處雖痛甚即愈一方治折傷及割破手足用蔥入灰火煨熟剝皮劈開其間有涕取敷患處仍多煨繼續易熱者一方治金瘡血不止用小薊葉搗爛封之一方治刀斧傷破流血不止及跌打傷用何首烏研末搭傷處血即止一方治刀割破頸顙一個大口急用嫩雞捋去毛扯下皮貼傷處立效一方治破傷血不止用龍骨末摻之一方用韭菜小薊同石灰搗成餅陰乾敷上破傷風破傷風證有多端汗下和之病自安發散祛風能奏效治之莫當等閒看治破傷風用槐子一合炒黃酒一碗煎至八分熱服汗出為愈一方治破傷風五七日未愈已至角弓反張牙關緊急用蟬蛻去頭足土淨五錢為末用好酒一碗煎滾服之一方治破傷風用魚鰾五錢炒黃淬黃酒於內飲之一方治破傷風牙緊不省人事垂死者用核桃殼半邊入稀人糞填滿殼將瘡甲掀去搭於上用艾炷於桃皮上灸之用人按住灸至九壯有汗出即愈宜避風治破傷風角弓反張用南星防風羌活甘草生薑五片水煎服一方治破傷風發熱紅腫風邪欲將傳播經絡而未入深杏仁去皮細研白麵等分和勻新汲水調塗傷處腫消熱退湯火傷治湯燙火燒腫爛疼痛用白礬末香油調掃患處一方用綠豆粉炒黑末新汲水調塗一方用大黃末蜜水調搽一方用百草霜輕粉為末狗油調搽一方治火燒傷皮破肉爛十分潮熱用尿桶底白渣攤於火紙上貼傷處蒸乾再易至涼為度一方用黑礬一合入新汲水內和勻頻掃患處一方治不拘乾溼火用舊鞋底燒灰香油調搽蟲獸傷狗咬用絲瓜小藤一大把研爛取汁一碗以綠豆粉七匙調服冬月略溫服春夏秋冷服忌生冷腥葷一方用杏仁甘草口嚼搭傷處又宜銀杏搗塗傷處一方癲狗咬用斑蝥七個糯米炒去翅足為末酒調服瘋狗咬後要忌羊肉狗肉紅豆一世外以生人糞塗之一方用韭菜根搗汁服二三盞外用艾灸傷處五七壯蛇咬赤腫欲死用白芷為末每三錢麥門冬湯調服外用白礬熔化滴傷處一方治毒蛇咬用五靈脂末每二錢酒調服蠍螫用人頸上垢擦患處一方用韭菜汁擦之一方用半夏蟾酥各少許擦之一方用黑鉛化開入水銀一錢砒一錢雄黃一錢為末擦之一方用端午日午時用硃砂書茶字倒貼之蛇蠍不敢近一方端午日用貓兒眼草汁捻入黃蠟內令勻為丸臨用取些須燈火化簪尖點痛處蜈蚣咬用菜油三錢傾地上以指擦地上油搽咬處即可不可令四眼見一方用生礬枯礬等分為末水調搽患處蚊蟲用端午日午時書儀方二字倒貼於柱腳上能闢蚊蟲一方用端午日午時取大蛤蟆一個用好墨一塊入口內紅線縛住取正午方掘一穴深五寸埋於內至第二日午時取蛤蟆口中墨收之用時將墨於壁上畫葫蘆一個用淨水噴三日蚊子盡入葫蘆內不可打殺欲其去時用扇扇去取墨蛤蟆活則驗蠅子用端午日午時寫白字倒貼於柱上四處則無蠅子頭上蝨用包銀硃紅紙燈上燒過蓋碗內少將茶清洗下煙與茶水搽頭髮內以帕包頭一夜其蝨俱死凡入山林默唸儀方不見蛇蟲誦儀康不怕虎狼山林日用法每欲出時用雄黃一桐子大火上燒煙起以熏腳䙀草履之類及袍袖間即百毒不敢侵害邪祟遠避中毒中諸毒只宜多灌香油最妙一方用甘草綠豆煎湯飲之能解百毒中砒毒用臘月豬膽收起遇中毒即割開一個入水化開服之立解一方用江西淡豆豉一兩干蚯蚓一個涼水調服中巴豆毒煮黃連湯飲之中巴豆毒痢不止用乾薑炮黃連炒等分為末每服二錢涼水調服中半夏毒以生薑汁飲之中杏仁毒搗蘭汁飲之中桐油毒嘔吐不止乾柿餅立解只飲熱酒亦可誤食花椒閉氣不通取新汲水飲之中蟹毒紫蘇煮汁解之中鱔毒並鱉毒蛤蟆毒用豆豉一大合新汲水半碗浸令豉水濃溫服此三物皆能令人小便閉臍下痛有致死者中啞芙蓉毒或致不省人事者用熱釅醋調糖斡開口灌至一二碗探吐中六畜肉毒用犀角磨濃水服一碗良中斑蝥毒煮黑豆汁飲之誤吞螞蝗入腹以濃茶多服自下諸骨鯁諸骨鯁用飴糖如雞子大吞之如不下更作大團吞之至十團無不下魚骨鯁另取魚骨一根插於患人頭髮內不必言須臾即下雞骨鯁用金鳳花為末醋調稀放舌上慢慢嚥下不可犯牙諸骨鯁用象牙屑以新汲水一盞浮牙屑水上吸之其骨自已雞骨等骨所鯁用細茶濃煎連吃五七碗以飽為度卻用老鴨刀子擂爛冷水調服即吐如不吐將鵝翎探喉即吐其骨救急自縊死者切莫割斷繩急抱起將繩慢解用手捻正喉嚨側臥蓋被用二竹管吹兩耳一人扯發以雙腳踏兩肩上再令人摩將胸膛及屈伸手足如蘇以溫粥飲灌之即活斡開其口以鵝嘴插入鵝鳴應聲即活刺雞冠血滴口中即活男用雌雞女用雄雞溺水死心下溫者即放大板凳上一頭襯高以鹽擦臍待水自出如口緊閉者以刀斡開橫放箸一根於牙間使水可出切莫倒提搗皂角以綿裹納臍下須臾水出即活將醋半盞灌鼻中凍死及冬落水微有氣者脫去濕衣隨解活人熱衣包暖用米炒熱囊盛熨心上冷則換之或炒灶灰亦可候身溫暖目開氣回後以溫酒或薑湯粥飲灌之若先將火炙必死用雄黃焰硝各一錢研細末點兩眼角壓死及墜跌死心頭溫者急扶坐起將手提其發用半夏末吹入鼻內少蘇以生薑汁同香油打勻灌之次取藥服如無藥以熱小便灌之中惡魘死者不得近前呼喚但唾其面不醒即咬其腳根及足拇指略移動臥處徐徐喚之原無燈不可點燈照待少蘇用皂角末吹鼻取嚏或用韭汁灌鼻內亦可一方治縊死溺死壓死靨死及產後暈絕又治中風不省人事用半夏一味為末如豆大吹入鼻中須臾即活附經驗秘方桃源龜齡延壽丹魏都堂方金筍即熟苄生精補腎粗而直者酒浸一宿瓦上焙乾為末五錢玉枝即生苄生血清心細而長者乳汁浸一宿曬乾為末六錢萬年松即天門冬潤肺清火酒浸半日去心皮曬乾為末四錢夷靈芝即川歸活血生精肥而大者酒浸一宿曬乾為末五錢鎮番草即枸杞子補髓生精酒露淨曬乾為末五錢碧水龍即肉蓯蓉補筋骨滋腎水紅而咸者河水浸一宿麩炒乾為末六錢三分劈凌雲即牛膝生精助陽去蘆酒浸曬乾為末四錢亂銀絲即杜仲強筋骨補腎水厚而實者去皮麩炒去絲小便浸一宿瓦上焙乾為末二錢半補骨脂即破故紙補虛助陽酒浸一宿瓦上焙乾為末一錢壽柴即鎖陽補虛助陽益氣堅而實者燒酒浸七次為末三錢半滄骨即青鹽補骨髓堅而正者酥炒乾為末三錢重英即甘菊花明目生精黃而小者小便浸一宿為末一錢半萬岑精即白茯苓生心血潤身體乳汁炒乾為末五錢半伏塵毯即地骨皮補虛損白而輕者蜜浸一宿曬乾為末四錢天雄即大附子補髓生精重一兩餘者蜜煮三炷香水煮一炷香去椒為末二錢半百里馨即小丁香寬腸胃黑色者同川椒炒一炷香去椒為末二錢半賽桂香即砂仁和脾胃堅而陳者薑汁炒乾為末二錢半海蓮即蓮肉養脾胃溫水泡去皮心為末六錢玉蕃絲即細辛通心竅細而辣者醋浸一宿曬乾為末一錢油鱉子即芝麻潤肺乳汁炒熟為末五錢黑漆子即旱蓮草生血補髓酒洗淨曬乾為末五錢半槐膠即槐角子明目酒煮透曬乾為末六錢半乾坤髓即辰砂安心神補腎水卻風邪四面牆光者面用蕎麵包住蒸熟去面為末五錢主人即甘草和中降火仍壯筋骨堅而壯者去皮蜜炙黃色為末六錢鎮山威即鹿角補心血圓而實者用砂鍋以好醋添水煮三晝夜土埋一宿取出曬乾為末一兩透石烏即穿山甲補肺金厚而大者燒酒浸一宿酥炙研末八錢鎖天蛾即石燕子補腎堅而圓者一對醋浸一宿薑汁浸一宿曬乾為末七錢崑山雪即小雀腦助陽補虛損雄者十個每個入硫黃一分或入硫黃一錢攤紙上攪勻曬乾三錢仙靈皮即淫羊藿生精髓乳汁拌炒乾為末二錢水雁即海馬補虛助陽長而全者一對酥黃色為末二錢旱珍珠即鳳仙子透骨通陽井花水浸一宿瓦上焙乾為末二錢半大鵬即紫梢花補虛助陽鮮而無土者河水浸一宿焙乾為末五分修制口訣上將各藥如法制畢選甲子庚申吉日良時入淨室通修合一處切忌雞犬及孝子婦人見之裝在磁器內以鹽泥封口重湯煮三炷香為度開口取出夜露一宿仍將前藥捏作一處卻放入銀打盒內以鹽泥封口外再以紙筋泥將銀盒團成圓球放日曬極干卻用鐵鑄鐘鈴一個仰口向上卻將泥盒球放其中再用鐵絲從鼻內十分拴緊外用黑鉛四五斤以慢火熔開成汁傾鈴內以遮蓋球盒為度候冷定仍入灰缸內火行三方養之每方用火一兩六錢至寅戌時更換換時以鈴內滴水響為度不可太熱溫養至三十五日卻將鈴內黑鉛化傾在地候冷定卻將銀盒取開看藥以紫色為度另用磁瓶收貯去火毒打銀盒用八兩重則可若遇乘興求藥者取藥五釐黃酒送下渾身躁急百竅通和丹田微癢痿陽立興時度數女而不泄刻戰百妓而弗溢酒勝勿攻食勝勿動氣血和平緩行無禁久久純熟不拘飢飽七十老媼春色裊八十衰翁精神長行之日久鼻口馨香明目寬胃資全仁壽未及半年羸弱變為嬰稚體若經一載衰容改作玉朱顏益精增髓其功尤大日久精盈氣壯血滿神充女侍之用不可少間陽舉不敗恐擾人事則未善矣知道者斟酌用之作金鈴法此藥用五分加麝香一分如黃豆大以綿裹住用線扎之以金三錢打成薄片將藥居中焊成圓彈或用銀亦可常掩袖中遇春而尋堤柳逢夏則覓流鶯乘興取藥暗索金彈握之在手須臾熱氣直透胸中緩緩流行歸於腎海敗陽似鐵錘痿莖如鋼釘不惟己樂紅粉亦欣兩情戀戀雎鳥關情誠人間之雅藥乃洞府之仙風價值雖萬金而莫傳惟有德而方授後學幸獲謹守勿輕凡媾精一度經停二度胎成三度孕成不宜再行若行四度必產雙生恐傷母體反失人倫其功如神如兔見鷹百發百中萬無一失要泄須食棗一枚即解之詠制紅棗詩峴山一帶假桑花清節橫揮鎮月斜多少名園培正果何分百姓帝王家紅棗製法琥珀精即小紅棗能泄氣核小而甜者去核一百個練風霜即白砂糖能回陽細而白者夜露一宿日曬一朝醋浸一宿取稠膏二兩用蕃釐石即食鹽能泄腎水同甘草二兩炒去甘草不用鹽用八錢上三味各如法制共攪一處裝入豬肚內用綿線縫合放大米內蒸熟取出仍裝磁器內封口三七日將棗用釅茶洗淨收之若食一枚興陽立敗而不舉矣詠煮金鈴鐺法詩一握渾身氣遂通上天梯樹方靈這般理趣誠然少舉世何人解此風上用金鈴鐺一個洗淨埋土中一宿假如頻使年久用之不效是為藥力泄盡氣也仍以川椒湯再洗淨埋土中一宿取出放磁器內以醋貯滿重湯煮緩聽鈴內有響聲為度取出收之再用之時照前神效莫測詠驗藥預知詩臞仙曾贈白釐翁夜放輝光照月明不是神功流腎海粉貓走入黑籠叢此藥合成誠恐心疑畏尚有毒遂將藥一分拌入飯中與白貓食之三日淫度無休飲茶即止旬日變黑冬要當風夏要入水是其驗也妙不可言秘當珍重邀月仙人捻桂花塵籠不覺老春斜閒中笑取一杯飲多少佳人極口誇先師曰世間方術雖多效應絕少好事者往往酷求未曾有得吾非上獲老龍授之豈能知其詳也先師問曰男子陽痿女子絕產何也老龍答曰男子未及二八色心一動精泄於外以損乾陽故致中年而陽痿也女年未及二七欲心一起血溢於外以傷坤水故致中年絕產也此中丞寶秘錄論之男幼損身嗜欲貪淫視如泛常略無節制日積月累釀成疾患百方弗痊非賴此方莫能救援依法修治瞬息見功先師曰誠確論也丁寧反復恐誤後學造法於後造酒法照前製藥令成塊取紙包裝絹袋內以線增口墜於瓶底四下用無灰好酒百壺醋和泥封口晝以日曬而攝其精夜以露敷而浥其液如此五次其香噴鼻取服半盞老翁變作少年郎老嫗化為青春女敗陽猖獗敵百妓痿莖顛狂戰千女頻攻頻勝越戰越強良久精凝目明如電渾身汁汗出能消痔漏癰疽化痰痞治疥癬去風邪療左癱右瘓調血氣而除胎前產後之疾熱淋白濁並皆治之冷痛赤白帶下時刻見功百日諸疾無侵行如奔馬發白復黑齒落更生如此三年長生不老返本還元乃號地仙種子人間驅赭使而成形遺名天下激將軍而聽令隨用隨生功效無窮矣載酒載歌樂有餘焉闡明不昧以廣其傳繼業流行有補於世靖和庚子八月下浣南溟山人蛟螭謹識總括藥方西江月藥共三十二味各依品料炮蒸石燕海馬辨雌雄前後增減已定問君共得多少一十四兩五分井河乳便拌調勻蜜酒酥油協用凡修此劑精白虔誠審藥真正辨陰陽奇偶凡諸腦損陽而莫用諸血敗血而休餐單日為陽產男有準雙日為陰生女無差雄者腰子可重雌者單胞可輕赭使時驅身氣壯盛咀嚼日久蓬萊相迎勞中有逸怒處成歡氣歸元海服握千朝我命在我不在於天宋真宗皇帝御贊嫦娥喜竊月中砂笑取斑龍頂上芽漢帝桃花敕特降梁王竹葉誥曾加須臾度過真堪羨衰老還童更可誇中有一般超絕處能教霜雪黑如鴉先師秘言為人乏嗣者有五一曰精冷二曰腎寒三曰天騙四曰皮漏五曰陽痿詳究聖典故有此說乃從人而修之以及五乏源若後茲人必誠必敬祝於天日之下啟於列星之前或服或握兩途符節驗火種薪猶粟造飯入山求石涉海求津編籬為戶引水為池夫豈難乎謹志朱晦翁曰世人陽疾有數一曰幼搖太過而損其神二曰落草受風而傷其真三曰酒勝泄頻而耗其精四曰食飽無度而喪其氣五曰暴怒顛狂而失其筋六曰濕寒乘興而傷其髓七曰悲泣過多而叛其心八曰歡樂甚極而失其節九曰當泄不泄而虧其脾十曰當行不行而搖其脅十一曰思慮太過而悖其情十二曰飢極使房而患其性似多端犯而致疾萬藥千方療莫能效非世乏此方乃修合誤而閉其門也古人云用藥如用兵存亡以此不可苟也蓋藥之主始各不同然皆以腎氣為主理氣調精無不效耳春雪歌茲藥補丹田清晨服一丸坐笑松蔭下橫琴大古絃目不視邪色心不被塵牽耕云並釣月精氣自周全世上少閒人山頭看碧泉有緣獲此訣即是地行仙若有人求方不與利相干斯藥金不換休言浪里煎一切沉疴苦服之便安然左癱與右瘓產後與胎前熱嗽並冷嗽黃痰與白痰心疼與耳閉腰痛並風顛乾血與頭悶蟲噎與驚疳中風同不語停痰並傷寒茶積兼酒積酒疸與吐痰食黃並瘧痢吐瀉與脾寒骨蒸同浮腫腳氣與頭眩淋瀝並手戰絞腸與心癇眼花同內障疝氣與口酸喉閉並乳蛾腫痛與胃翻血瘤同癭滯肺氣並黑斑腸風與痔漏牙痛並頭旋夜哭與晝哭重舌並氣喘腹脹同吐血狗咬並蛇餐消渴與麻木發熱並狂言泄精同遺溺盜汗與疥癬凍瘡同杖破蠍螫並崩難經絕與勞瘵翻胃並皮穿病在上食後病在下食前多無三兩月改變勝童顏自樂煙霞景人間別洞天嫦娥知我趣褒封應失傳遺文恐不信聯此各一篇英國公自詠金鈴賦形如雀卵色似娥黃外視輕如糞土內論貴於清琅無邊佳趣叢繞吾旁比金金易得比玉玉何償連城和氏璧不換金鈴鐺任爾腰金紫任爾架高堂任爾跨裘馬任爾材棟梁任爾隨鳳闕任爾制八荒不如吾安樂不如吾悠揚何為如意丸庭前棲鳳凰蜀錦添花彩秋月回輝光這丸金彈子千金不易方用之吾掌內飄然入洞房壺中春不老心頭歲月長玉山無勝敗金海有炎涼愈戰精神爽久敵氣血剛累握寬皮腹連服和胃腸九竅除沉疴三尸盡伏降百日鬢毛黑千期體健康固齒且明目消食並化痰萬般塵世苦一握入仙鄉侯門虛寵位浮生空自忙不如予心樂時侵月殿香三春真富貴惟我第一場半川風月景幾樹橘花黃興懶沽春酒如意懷袖藏琥珀吞入腹收兵罷戰場陽姤生麟子陰諧產女媓快活真快活石枕伴藤床我今獲此訣不戀侯與王功名如浮雲富貴似粃糠百子千孫茂萬載一名揚清隱林泉下逍遙汾水旁琴書共鹿鶴相隨滋味長天下奇男子學此金鈴法皮日休贊鳳儀鱗生世不常積金難買骨精強將軍英武無休止赭使風行罷戰場穀神子括曰駐世無真訣探奇遇偓佺一丸回造化半點結良緣紅塵成紫氣白髮返青年云外穀神子留方海內傳萬杯不醉丹中書李五山傳白葛根四兩青鹽水浸一晝夜取出曬乾白果芽白果內青芽一兩蜜浸一日砂鍋內焙乾細芽茶四兩綠豆花四兩陰乾葛花一兩童便浸七日焙乾陳皮四兩青鹽水浸一日以上青鹽用一兩化水菊花蕊未開口菊青朵頭四兩莞豆花五錢真牛黃一錢青鹽四兩盛入牛膽內煮一炷香同膽皮共用上共為細末用蟒膽為丸如梧桐子大飲酒半醉吞一丸其酒自解再飲時再服如此經年不醉紫霞丹徽府秘方秋石陰煉者五兩南薄荷五兩硼砂二兩訶子去核五錢牛黃五分冰片二錢麝香一分甘松五錢排草一錢膃肭臍一錢酥炙阿芙蓉二分硃砂五錢為衣上共為細末合和研勻用甘草一斤炙去皮水煮成膏子和為丸如綠豆大以硃砂為衣每用一丸時常噙化嚥下詩曰秘傳物外紫霞丹安魂定魄駐少顏順氣寬胸能解渴消痰止嗽更除煩平添牙頰香津滿善補元精氣海完每服一丸噙化咽延年益壽世間仙治瘋狗咬此方驗過用斑蝥三個去翅足研細末酒一鍾半空心服即下小狗娃四十九個如不盡再服神效治月經不通身黃用白礬枯半兩陳皮三錢為細末黃蠟半兩化開為丸每服三五十丸米湯送下一方用乾漆炒脆酥服一錢黃酒送下治乾血勞用大麥芽小麥芽俱炒千里馬各一兩為細末每四錢黃酒送下治尿血用龍骨四錢為末食後酒下治腸風下血用椿皮白皮酒浸曬乾為末棗肉為丸梧桐子大每服五十丸酒下效驗治霍亂用桑皮搗汁每服一盞冬月煎湯服治痢方用大麥芒不拘多少炒黃為末加黑豆二十五個以下明刑本殘缺不全略附日用雜方香茶餅甘松白豆蔻沉香檀香桂枝白芷各三錢孩兒茶細辛南薄荷各一兩木香藁本各一錢片腦五分共為細末用甘草半斤為粗末水浸一宿去渣熬成膏和為餅用上清丸南薄荷一斤百藥煎一斤寒水石煅玄明粉桔梗訶子肉南木香人參烏梅肉甘松各一兩柿霜二兩細茶一錢甘草一斤槌碎水浸一宿取汁去渣熬成膏或加蜜一二兩同熬二碗許和前藥為丸如白果大每日一丸噙化玉露霜真干綠豆粉一斤南薄荷葉半斤水噴令濕用小磁壇一個將薄荷一半鋪壇底將豆粉用新布包裹入壇中上又用薄荷蓋住得壇口封固勿令泄氣重湯煮三炷香要水滾方可壇煮取起冷定一二日方開壇去薄荷取出豆粉用白糖半斤拌勻篩過磁器收貯任用若欲丸入碾子碾之即丸得楂梨膏鮮山楂大者十斤去核好甜梨去核淨十斤共搗爛取自然汁入鍋內煎熬如稀糊樣如汁十斤入蜜四斤再熬成膏可作餅子用之法制半夏用大半夏約二斤先用滾湯泡洗二三次去滑膩淨用白礬六兩皂角四兩生薑四兩水二斗煎至一斗浸半夏十四日俱曬浸取出洗淨復用白礬二兩煎水浸七日又洗淨取出用清滾湯洗又浸三日又洗淨切成片且俱要白色曬為佳將製成半夏片用蘇州好薄荷葉蒸格上鋪開上放布將半夏片鋪薄荷上以蒸格放鍋上蓋完固勿令透氣蒸二炷香盡取出曬乾則成法制半夏加用半夏一兩薄荷葉三錢粉草片二錢和勻口中細嚼則清火化痰健脾和胃生津液解酒毒除眩暈法制陳皮每陳皮一個用甘草四兩水煎煮陳皮半生半熟洗去垢膩曬乾又用烏梅六兩青鹽四兩煎水去渣煮陳皮半熟曬乾又用薄荷葉二兩紫蘇葉一兩用水灑濕鋪甑底將陳皮放上蒸透取出切絲曬乾入白糖半斤共炒取出用之香豆豉方鹽二斤草果去皮十斤時蘿二兩小茴二兩花椒二兩官桂二兩砂仁二兩紅豆去皮五錢陳皮切絲五錢瓜仁五錢甘草去皮切片一兩杏仁去皮切四片五錢橙皮切絲一兩蘇葉切絲二兩薄荷葉切一兩生薑二斤臨時切絲菜瓜十斤去囊切丁臨時用上各俱為末於三月三五月五用大黃豆一斗水淘淨浸一宿控干籠蒸至熟冷一宿細面拌勻用羅篩去粗渣凳箔一二尺高蘆蓆攤豆約二指厚用豆蒿或楮葉並席密覆七日上有黃衣取曬乾箕淨入料物六月六日下不用水攪勻一日拌四五次裝壇內逐日輪曬至三七傾出曬半乾濕復入壇內取用或將油拌即是濕豆豉玉壺春六月六日取不語水聽用七月七日造面每用面十斤綠豆三升磨破水泡去皮用六月六日水煮熟曬乾與面同調一處又用白蜜半斤煉過又用官稜川芎白芷香陳各五錢為細末共調一處踏面或切作一斤一塊或半斤一塊先用楮葉包吊在微風處三七日可用造酒每黃米一斗春秋用面半斤夏用六兩冬用一斤賽襄陵酒麴方烏頭去皮臍細辛白芷良薑官稜去粗皮白朮各十二兩杏仁去皮尖一斤六兩上共為末入白細面一百斤攪令勻用綠豆五斤煮熟晾冷同和一處踏成小曲塊內用桑麻葉包裹外用白紙包裹當風處置箔攤上過一七翻一次方用米一斗用此曲十二兩五香酒治一切飲食過度最能消導善退諸疾又能不病酒上腹痛大補血氣健脾胃久服自然健壯其功不能盡述木香丁香沉香檀香香白芷生地黃熟地黃官桂砂仁當歸陳皮人參白朮川芎薄荷甘草各一兩熟棗十二枚核桃仁二兩蜜一斤好燒酒一罈將前藥切片用生絹袋盛之入壇內紙封口復用竹葉封之煮長香三炷七日開用牛脯法每牛肉十五斤切作四塊用蔥一大把鋪鍋底加肉放上入花椒二兩黃酒十碗清醬油二碗鹽二斤添水離肉四五寸高慢火煮至汁干取用冬間可放數月不壞雞松法雞用黃酒大茴香小茴香花椒鹽煮熟擇去皮骨淨肉火焙乾擂爛再焙乾用牛松豬松同法鵝醬法鵝去毛骨切肉絲一斤用飛鹽八錢清醬油一碗紅曲米糝大茴小茴花椒末用酒二鍾拌勻入磁罐內上用江米酒糟一團蓋而封固待月餘取出食之米糝即大米水泡炒過是龍蛋法用雞子二三十個打放一處攪令勻入豬尿泡內懸於日月之下一夕或蒸或煮其蛋黃白自分一法黃昏裝入井內至三更取出煮之醬油法用黑豆煮爛濾起放席上汙七日取出曬乾揣去皮殼加鹽同入水內泡日曬至紅色逐日撇上油水收起撇至干取出豆用椒醋法香油一斤煎滾入釅醋一斤再滾取下入口椒於內泡之裝入壇內封因用時取之五六月間好制續勸善良規四十歌一勸為官者第一要循良廉能治百姓忠蓋報君王二勸為民者先要納差糧各人尊法度免得受刑傷三勸為父者教子以義方窮則守家業達則登廟廊四勸為母者母心本慈祥大小無厚薄合室自安康五勸為夫者家須自己當婦言莫聽信男子要綱常六勸為婦者賢孝事姑嫜莫把是非謗謹守在閨房七勸為兄者友弟義何長莫因毫末利手足各參商八勸為弟者敬兄忠實腸凡事須體諒慎勿逞強梁九勸為子者孝須奉高堂竭力伕甘旨承歡戲彩裳十勸為內者妯娌莫相戕大家要和睦永世不分張十戒歌其二一戒為士者當乘駟馬車必須通萬卷還要惜三餘二戒為農者耕種莫違時不辭辛苦力療得肚中飢三戒為工者伎藝要精奇寧將勤補拙莫把懶添愚四戒為商者為利各分離切將花酒戒莫負倚閭思五戒為親者往來禮莫遺未可交財利因而親也疏六戒為鄰者相敬莫參差一時有患難彼此要扶持七戒為友者信義是良期石交尤可近面結莫相隨八戒為奴者勤勞莫怨咨不負主人意何愁食與衣九戒為富者貴在能設施不然守財虜未知留與誰十戒為貧者休嫌陋巷居甘貧無諂媚做個好男兒十莫歌其三一莫學奸詐暗箭誰堤防無辜被毒害鑑察有穹蒼二莫去偷盜犯之必有贓輕軍重死罪律條難隱藏三莫去賭博為此破家囊飢寒妻子怨羸得淚成行四莫縱飲酒醉後發顛狂損身喪德行惹禍起蕭牆五莫嗜色欲欲乃殺身槍雖然不見血暗教性命亡六莫貪財利人心無盡量窮通各有分不用苦奔忙七莫爭閒氣到官何怕強不如含忍好省得賣田莊八莫學懶惰一情百事荒為人不努力畢竟受淒涼九莫學慳吝慷慨有何妨浮生風裡燭富貴雪中湯十莫要積惡積惡有餘殃勸人當積善積善有餘慶十要歌其四一要重身命貴莫貴於斯此身一輕棄何用萬金資二要存好心心田要坦夷若還有欺罔天譴罪難辭三要做好人好人最難為輕財還重義有道更無私四要積陰騭念念在於茲廣行方便事自有天上知五要守本分莫去佔便宜難割他人肉補得自身衰六要循天理公平無所欺莫使兩鬥秤暗裡把人虧七要能忍奈忍得是良師不忍小成大過後悔時遲八要為勤儉奢侈豈是規勤乃起家本儉乃鎮家基九要惜守陰寸陰金不移若教虛度過老去徒傷悲十要有德量寵辱不警疑崒律如丘岳汪洋若寵陂醫要活人其來遠矣但世醫徒知攻其已病而不知治其未病以余度之與其能治於已病之後不若預治於未病之先乃於暇日吟成四十鄙歌其中養生之道無弗備焉然辭雖淺俗俾世人見而易知簡而易從無論通顯之家寒素之士能預味之則可以培養身心而為太平考終之人矣豈曰藥石云乎哉否則心縱滅理而陷於殞命殺身之地良可慨夫余不佞敢附此於仙方之末以為不病者鑑焉萬曆癸未仲春金溪雲林山人龔廷賢書括曰海上仙傳秘人間杏作林誰知方藥簡何畏病根深守業經三世回生抵萬金但存斯卷在不用召醫臨慶安三年仲夏之吉室昕通鯉山町小嶋彌左衛門刊
