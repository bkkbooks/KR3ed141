front:
  text: 序醫稱王霸殊溯古辨之若魚目夜光碔砆連城然不爽也顧霸之效也詭駁之宜而王謂易簡曷以也醫惡是類乎余自髫齔席箕裘業從家大人醫寓中家大人輒以霸禁比長客壺京肆稍見俞諸大方若蔣定西高使相劉秋堂諸老企以王道醫交口稱矣余竊自信乃取家大人所傳方書而續其餘成醫鑑一帙鍥之以便世用第方多萃味而窶人僻地或購之難誠杏林遺春也乃復竊父志括俚言切病情選方擇味類以一二易致者動療巨疴見者奇之命曰種杏仙方俾家易辦人易曉而遐陬胥靡咸在杏蔭中矣第恐出奇吐秘見者以霸術目距知王之易筒正坐此矣譬之夜光之珠奚必徑寸連城之璧奚必拱把魚目碔砆寧得而亂之乎書成辱名輩序諸首帙余故吐取懷以自白雲時萬曆九年歲次辛巳孟秋之吉金溪雲林山人龔廷賢書於有恆堂
