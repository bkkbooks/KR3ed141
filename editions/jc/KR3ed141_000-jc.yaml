body:
  text: 刻種杏仙方引方名種杏志效也效考如奏音心八音諧則古為難若一音自終始亦可發性靈宜和氣功將與大成埒何逸也龔氏子才操岐黃之秘而鳴諸豫嘗佐而翁著醫鑑行於世矣為浩博而旨奧構材備難致也乃更擇易簡投單品輒效者為四帙又不為艱深語即窮嗇人讀易解能卒然辦譬之阮瑟嵇琴一脫囊自成韻調又可以名家也古有種杏識效者莫此速殆無幾林矣故名集而梓之何子曰醫人等國古記之矣乃醫國長筴若治安天人亶亶常數千言咸切中世疴而競莫實效不謂用之者艱哉或伺隙乘會投片言悟主乃能力轉鈞軸而措之安又不比於好竽操瑟之誚不逸且大耶微錘能制闔闢寸機握弩千鈞是集也功大成也若夫備聲振以考全效則固有醫鑑在矣子才名廷賢號雲林江西金溪人時萬曆辛巳歲孟秋士冖米殳日大梁進士見寰何出圖書儒醫雲林山人像贊有引山人鳴於醫有年矣好事者愛而貌之以布寓內索贊焉余稽太史公謂人貌榮名寧有既乎山人榮哉山人江以西金溪產也父西園翁嘗以醫動我梁豫生山人而訓以儒儒既通去讀醫盡父之技復攜壺遊潁汝間潁汝士爭接納也有投輒效已而京都諸緒紳無不知山人者延致之遂壺于都市都中自高使相而下咸賓禮如不及定西蔣候尤慕其醫而儒也俾冠佩列於醫林歸而鄉往者益眾然山人愈自淬也日取岐黃家言參所父授者為醫鑑鑑之餘復有是帙焉持此醫寓內則所生活者不數也脫令人蒔之杏不啻林矣因梓其帙曰種杏仙方貌厥狀而弁之乃何生則為之贊曰梧言魁度星眸尤頤伊語之豐清夷世醫業以箕裘材以瑰琦仙終儒始遐覽玄思藝圃遺雋壺天用羇修能懋譽峨博是且是海上之安期或青牛師僉日想見其英姿請稽於斯賜進士第兵部觀政扶溝中寰何出光書
