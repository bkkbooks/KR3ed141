body:
  text: 卷一括曰仙方几卷邁青囊萬園從今杏吐香一粒有功回造化百年無病到膏肓每將金匱藏真訣直把靈臺擴化光雖積陰功滿天下願期聖主壽無疆中風中風身溫口多涎卒然昏倒不能言急用通關開噤口化痰順氣治當先治中風痰厥不省人事即將病人頭髮提起勿放用大指掐刻人中穴將兩手足頻頻往下四梢趕之使痰氣不上攻心即以半夏末少許吹入鼻內或牙皂細辛等分為末吹之亦可候有嚏可治無嚏不可治如口噤不開用烏梅肉揉和南星細辛末以指蘸藥擦牙自開如喉中痰盛用綿紙捻一長條密密打成疙瘩插入喉中轉動扯出痰來頻頻將痰引出急用香油灌之或生薑自然汁或竹瀝皆可或用染布活靛缸水一鍾溫服亦可一方用白礬末二錢以生薑汁調灌立醒一方用白礬硼砂各一錢為末青黛煎湯調服一方用牙皂七個蜜水同煎用鵝管吹入些許於口內即效一方用燈草一兩燒灰枯礬一兩百草霜五分共為末每五分生薑湯調服一方治中風不省人事不問痰厥氣厥用南星八錢木香一錢切作一劑生薑十片水煎溫服一方治風著口面喎斜語音不轉用獨活三兩竹瀝一升生地黃汁一升同煎去渣溫服未正更進一服一方治口眼喎斜用蒼耳草水熬汁去渣入蜜再熬成膏無時服一方治中風口喎不正語則牽急四肢如故無他苦由居處不便因臥而孔風入耳客於陽明之經故令筋急不調而口喎僻也用大皂角五兩去皮子為末以三年米醋和成膏左喎塗右右喎塗左干更塗之一方治口喎斜用大鱔魚一條以針刺頭上血右喎塗左左喎塗右正即洗去一方治口眼喎斜用白芷獨活薄荷等分為末煉蜜丸如彈子大每一丸細嚼茶酒任下一方治中風口眼喎斜時吐痰涎語言謇澀四肢緩弱筋節疼痛腰膝無力亦能行大腸氣治三十五般風用豨蘞草此草處處有之俗呼為火杴草其葉對節而生葉似蒼耳用五月五日七月七日九月九日收採洗去土採取葉不拘多少曝乾鋪入甑中用白酒和蜜層層勻酒蒸之復灑如此制之九次為末煉蜜為丸如梧桐子大每七八十丸空心酒下一方治中風不語手足不隨口眼喎斜鼻流清涕頭旋目眩言語謇澀心胸痰積口中涎水手足頑麻腰膝疼痛久立不得頭痛尤甚攻耳成膿而聾又沖眼赤及骨節風繞腕風腎臟風胎風頭風暗風心風大風白癜風並膈氣冷熱諸氣餌之者治百病夏無瘟疫秋無瘧痢宣通五臟祛逐諸風癥瘕積聚痃癖氣塊痰唾涎水膀胱宿膿嗽喘腫脹黃疸癬瘡疥癩憎寒壯熱虛損傷敗一切病症服之大驗其性甚善不傷諸藥惟忌茶茗可煎甘草梔子代飲仍以不聞水聲者良淨室修合用威靈仙三月丙丁戊己日採洗淨焙乾為末好酒和令微濕入竹筒內牢塞口九蒸九曝添酒灑之以白飯搗為丸如梧桐子大每二十丸至三十丸溫酒送下不拘時服傷寒附傷風傷寒大概是熱病百般變化常無定要明汗吐下和解表裡無差方有應治傷寒頭疼發熱無汗用細茶核桃肉蔥白生薑等分同搗水煎熱服出汗一方用白蜜半盞黃酒一鍾同煎熱服登時汗出而瘥一方治傷寒初起用生薑帶皮者二三兩搗爛將熱酒泡飲出汗而愈一方治傷寒凡陰陽兩感初起發熱憎寒用蔥帶須七根生薑連皮七片共搗碎加白糯米一撮水三碗煎二碗加好醋少許乘熱飲之待汗出即愈一方治傷寒傷風用緑豆一兩麻黃八錢為末每一錢無根水調服不用被蓋其汗自出一方治傷寒遍身如錐剜痛不可忍用防風羌活蒼朮各五錢以童便二碗浸一時煎滾去渣溫服一方治傷寒發狂奔走人難制伏先於病人處生火一盆用醋一碗傾於火上其煙沖鼻內即安一方治傷寒熱病熱邪傳裡亢極無解用黃連煎水一盞放井中頓冷浸青布搭在胸上徐徐換之待熱勢稍退即除不可久漬夏天用冬不宜用一方治傷寒發狂窬垣上屋用黃連寒水石各二錢為末濃煎甘草湯冷調服一方治傷寒發熱黃目不識人用生蔥火煨熟去粗皮用心扭出汁蘸香油點兩目大小眥立明一方用燒酒口噙令病人開目噴之其眼自明一方治傷寒時氣熱極狂亂者及發熱不退用雞子清一個白蜜一大匙芒硝三錢涼水和下一方治傷寒心慌用鮮生地黃汁童便各半盞合一處重湯煮數沸溫服一方治傷寒鼻衄久不止者用山梔子炒黑為末吹鼻內將紙水濕搭於鼻中其血自止一方治傷寒吐血不止用韭汁磨京墨呷下其血見墨必止如無韭汁雞清亦可一方治傷寒服藥轉吐出不納者隨用竹管重按內關後將生薑自然汁半盞熱飲其吐即止大凡服寒藥熱飲熱藥寒飲中和之劑溫而服之治傷寒濕熱發黃布心昏悶不省人事死在須臾用白毛烏骨雞肉雄雞一隻干捋去毛破開去腸屎刀切爛鋪心頭少頃即能說話瘟疫瘟疫衆人病一般四時不正外邪干要分春夏秋冬治莫把寒溫一樣看治天行時氣宅舍怪異用降真香燒之小兒帶之能避邪惡之氣一方治瘟疫不相傳染用赤小豆以新布盛入井中浸三日舉家各服二十一粒一方用硃砂研末煉蜜和丸麻子大常以太歲日一家大小勿食諸物面向東立各吞三七丸勿令近齒永無疫疾一方用雄黃末以筆濃點鼻內兩旁中則疫氣不能入亦闢諸惡怪夢一方治天行時疫傳染用白粳米半升連須蔥二十根水二十碗煮成粥湯加好醋一小碗再煮一滾各服一碗取汗愈曾出汗者不用一方治時氣瘟疫及小兒熱癇狂啼大人服丹石發動此疾酒後暴熱用臘月八日收雪磁器盛之遇此服之一方治感冒瘟疫發腫用黑豆二兩炒令香熟甘草二寸炙黃水煎時時呷之一方治瘟病狂言心躁結胸將死用苦參二兩切碎酒二斤燉滾服之或汗或無汗或吐或不吐俱愈一方治瘟疫邪氣百病用棗一枚咒華表柱念七遍望天罡取氣一口吹於棗上令病人嚼吃湯水任下此三字鬼之祖名也一方治疫氣傳染此疾汙氣入鼻至腦即散布經絡初中覺頭痛即以水調芥菜子末填臍以熱物隔衣一層尉之即汗而愈一方治四時瘟疫頭疼發熱衆人病一般者用黑砂糖一盞入薑汁二盞化開服之當時憎寒壯熱汗出立愈中暑中暑中熱不相同行人中熱在日中避暑深堂名中暑暑分寒熱不同攻治中暑迷悶用蒜研熱湯灌之或用連皮生薑一大塊研爛熱湯灌下卒急不得熱湯以冷水研搗亦可一方治中暑身熱口渴小便不利用滑石六兩甘草一兩各為細末研勻每服二三錢不拘時新汲水調服一方治傷暑霍亂用香薷扁豆等分水煎不拘時頻頻服之一方消暑止渴生津液用烏梅一斤槌碎核用溫水浸一宿去水用甘草四兩切碎白鹽二兩相拌於砂鍋內入水慢火煎得宜收磁罐內任意用湯點服遇天熱冷水調亦可一方治中暑卒倒用路上熱土尉臍中以人尿溺其上以大蒜研爛熱水調灌即活切勿用冷水及臥冷地正如凍倒人不宜近火恐逼寒氣入內即死也中濕中濕亦由內外傷外衝風雨內酒漿發為腫滿渾身痛利水和脾發汗良治中濕筋急拘攣不能屈伸及風濕痹用薏苡仁和米煮粥常食之功勝諸藥一方治濕氣遍身手足作痛用蒼朮一斤一半米泔浸一半童便浸一日一換浸三日曬乾為末酒糊為丸如梧桐子大每七十丸空心黃酒送下一方治患濕不能行指腫者九月間收茄根懸檐下煎湯洗之一方治男子玉莖濕癢用肥皂一個燒灰存性香油調搽一方治男女下部濕癢用蛇床子煎湯洗之凡空房久閉者不宜輒入欲入先以香物及蒼朮之類焚之俟鬱氣發散然後可入不然感之成病久閉井窖尤宜慎之脾胃脾胃之氣要衝和胃司納受脾運磨莫使寒溫一失節損傷元氣病難瘥治脾胃損傷飲食不進肌體瘦怯或泄瀉等症用白朮一斤去蘆油火上炙一塊切一塊成片入砂鍋內用水七八碗熬至二碗再用水八碗熬至二碗如此三次將渣搗爛入水又熬絞出汁一二碗去渣將前汁再熬只留二碗加蜜四兩共熬至稠黏滴水成珠為度埋土中三日取出任意食之或用米湯化服亦可一方治脾胃虛弱不思飲食用大米一升糯米一升乾山藥四兩芡實四兩各為末入白砂糖一斤半和勻入籠內蒸糕食之一方治胃弱不能飲食或病後虛損用蓮肉四兩老米四兩炒砂糖二兩白茯苓二兩俱為細末每服五六匙不拘時白湯調下一方治脾胃因飢飽失節不時生病用陳倉米一兩陳皮二兩為末姜糊為丸如梧桐子大每服五十丸食遠米湯下一方治飲食不住口仍易飢餓用緑豆黃麥糯米各一升炒熟共磨成粉每一杯滾湯調服一方治口淡飲食無味用白砂糖二兩烏梅去核五錢水二鍾煎至一鍾如稠糊每用二匙則口知味矣傷食傷食過飽損脾胃惡食咽酸噯臭氣胸痞發熱及憎寒輕可消化重則利治一切酒食停積脹滿不消用鹽花擦牙齒溫水漱下不過三次如湯潑雪即時寬腸通快也一方治食肉太多不化腹脹發熱用山楂去核一兩水煮先飲湯後食山楂一方治食糍粽過多胸膈停滯一塊作痛塞悶用酒麴一塊燒存性為末黃酒調服一方治食生冷傷脾用砂仁煎湯常服一方治酒食過飽用青皮二兩炒葛根一兩砂仁五錢為末每一二錢茶調服消食化氣醒酒不拘時服一方治食狗肉不消心下堅或脹口乾忽發熱妄語用杏仁去皮水濃煎去渣服下肉為度一方治酒醉不醒搗葛根絞取汁一二盞服之或乾葛水煎服亦可一方治脾胃氣弱食不消化嘔逆反胃湯飲不下用宿米半升搗末水丸如梧桐子大煮熟入鹽少許空心和汁吞下日再服一方平人常服治痞消食強胃白朮二兩枳實麩炒一兩為細末荷葉一掌大煎湯煮粥為丸如梧桐子大每服五十丸不拘時白湯下痰飲痰多屬濕津液化隨氣升降上中下百病之中兼有痰隨證調治應無價治痰壅盛用梨汁一鍾薑汁半鍾南薄荷三兩共和勻重湯煮十餘沸任意食之一方用竹瀝大半碗鵝涎數滴雞清一個硃砂一分末攪勻服之取鵝涎法將鵝倒吊用雄黃末吹鼻孔候出取用一方治痰火上升停滯不快用大黃酒拌九蒸九曬為末水丸每五十丸白滾水下一方治胸中有痰瘀癖氣者用白礬一兩水一碗半煮至一碗入蜜一合更煮少時溫頓服即吐如未吐再進熱酒一盞即吐一方治痰火上壅或流入四肢結聚胸背或咳嗽或頭目不清用軟石膏三兩半夏一兩泡七次白礬五錢為末淡薑湯打糊為丸如緑豆大每三十丸食遠茶清下一方治吐痰喘嗽用大半夏一斤泡去皮臍用白礬六兩煎湯浸半夏春夏三七日秋冬七七日撈起曝乾又用生薑六兩搗汁浸春夏三日秋冬七日曝乾陰乾亦可研為末用甘草一斤水煎膏作丸每一丸如櫻桃大臨臥噙化三丸一方降痰火兼治聲嘶用白礬一錢水花珠二分半同研末入磁器內熔化乘熱捻作九丸每服三粒白湯下一方治痰盛用貝母以童便秋冬浸三日春夏浸一日夜撈起水淋洗淨曬乾研末糖霜和勻滾白水調下一方治痰火用蘿蔔子炒為末皂角燒存性生薑加煉蜜丸如梧桐子大每服五七十丸白湯下一方化痰丸用天絡絲即絲瓜也燒存性為細末棗肉為丸如彈丸大每服一丸好酒下立效咳嗽咳謂無痰卻有聲嗽謂無聲卻有痰有痰有聲為咳嗽化痰理嗽自然安治新久咳嗽並連嗽四五十聲者用連皮生薑自然汁一勺蜜一匙同放碗內重湯煮一滾溫服一方治咳嗽每晚臨臥時用大柿餅二三枚蘸極細青黛末慢慢嚼服一方治痰嗽用白糖生薑搗爛露一宿白蘿蔔湯下一方治喘嗽吐痰久不愈用知母貝母等分為細末老薑切片蘸藥細嚼白湯下一方治咳嗽喘急不論新久用天花粉五兩人參五錢為末每服二錢半陳蘿蔔煎湯調服一方治新久痰喘咳嗽用黃熟瓜蔞三五個連皮子三份入白礬一份搗和成餅用竹蔑穿掛通風處陰乾研末用薑汁打稀糊為丸如梧桐子大每五十丸食遠淡薑湯送下一方治嗽一兩香油四兩蜜四兩生薑自然汁紫菀麻黃並杏仁百年勞嗽永無跡上將油蜜姜銅鍋煉點水成珠用紫菀等各一兩五錢為細末入內攪勻再一熬磁器盛貯每晚吃四五匙茶下一方治年深日久咳嗽肺虛寒熱用款冬花不拘多少於密室中如香焚之煙起以筆管吸其煙則咽之或於坐臥處如香焚之不吸亦妙重病數日見效輕者即效一方咽乾口燥茶清送下喘急喘急須分肺實虛挾寒挾熱緊相隨痰火諸般皆作喘治之莫要有差疑治氣喘用韭菜汁飲一杯效一方治上氣喘嗽煩熱不下食食即吐逆腹脹用生薑五合砂糖四兩相合慢火熬二十沸每用半匙含咽一方治積年上氣喘促咳嗽唾膿血者用蘿蔔子一合煎湯食後服一方治氣喘身浮腫用甜葶藶一升炒搗如膏彈子大每一丸水一盞棗四枚煎五分去渣溫服哮吼哮吼肺竅積寒痰令人齁喘起居難豁痰降火加調理不遇良醫病不安治哮吼用核桃肉一兩細茶末五錢和勻蜜入三四匙搗成丸如彈子大不拘時噙化一方治哮吼用雞子一個略敲殼損膜不可損浸尿缸內三四日夜取出煮熟食之蓋雞能去風痰一方治厚味發者用蘿蔔子淘淨蒸熟曬乾為末薑汁浸蒸餅為丸每三十丸津下一方治齁喘用枯礬末一匙臨臥時滾白湯調下一方用雞子一個頂上取一孔入人中白末二釐調勻紙糊煨熟食之瘧疾瘧是風暑不正邪為寒為熱兩交加新瘧可散亦可截久病還當兼補佳治一切瘧疾用老生薑自然汁露一宿於臨發日五更時令患者面北立飲即止未止再服一方截瘧用端午日以獨蒜不拘多少搗爛入好黃丹研勻乾溼得所搓作丸如龍眼大曬乾收貯但瘧一二發後臨發日雞鳴以一丸略槌碎面東井花水送下一方治諸瘧用枯礬為末醋煮麵糊丸如雞頭子大每服一丸用東南桃心七個煎湯下如霍亂薑湯下紅痢甘草湯下白痢薑湯下忌葷腥油膩炒煎之物一方治瘧用隔年全歷日端午日午時燒灰糊丸如梧桐子大當發日早每服一丸無根水送下一符咒治瘧於臨瘧日早五更雞犬不聞之際令病人朝東方立將硃砂畫符於病人背上念咒語云天火燒太陽地火燒五方雷火勢常法燒死諸不祥急急如律令敕已就是久瘧不過二次即止一方治瘧用桃花信細茶各五錢為末棗肉為丸辰砂一錢為衣男左女右握在手心即效一方治瘧母停水結癖腹脅堅痛芫花炒硃砂等分為末煉蜜為丸如小豆大每服十丸棗湯送下一方治諸瘧如神用天靈蓋燒存性為末每服五釐空心黃酒調下痢疾痢因濕熱並氣滯赤傷血分白傷氣赤白相雜氣血傷清熱理氣先通利治痢疾腹痛不問赤白冷熱用老生薑細茶各三錢用新汲水煎服一方加連根韭菜三味同搗汁酒調服亦可一方治痢膿血稠黏裡急後重晝夜無度用大黃一兩好酒二鍾浸半日煎至八分作二次服之一方用王瓜削去皮蘸蜜吃一二個當時腹痛一陳利下積滯而愈一方用蟬蛻炒為末每服一錢白痢燒酒下紅痢黃酒下一方用緑豆炒為末入白糖和涼水服一方治久痢止澀之藥用五倍子枯白礬石榴皮等分為末煉蜜為丸如黃豆大每一丸空心冷水下一方治紅白痢用五倍子末每三錢茶調服一方治痢不問赤白新久用臘肉骨燒存性為末陳皮末各五錢甘草末一錢共和勻每服二錢熟水調服一方治白痢如魚凍色者久不愈用白鴨一隻殺取血以滾酒調和服之一方治赤痢用百草霜末五錢熱酒調下一方治休息痢用天靈蓋燒存性為末每服三五錢入細面和成餅火煨熟吃一方治疫毒熱痢將松花篩細末每二錢用薄荷煎湯入蜜調下一方治噤口痢藥食俱不納者用田螺數枚連殼搗爛加些麝香在內調勻填滿臍內引火下降服藥再不吐矣飲食須慢慢少少進之一方治噤口痢湯飲米穀不下用石蓮子去殼並內紅皮及心為末每二三錢用井花水調下日進二服一方治噤口痢用烏梅三錢陳細茶三錢為末米湯調服一方用三片生薑三個棗三個烏梅一寸甘草榴皮半個鍋內炒二鍾水煎一鍾溫服泄瀉泄瀉注下濕傷脾燥濕利水補脾虛若還久瀉腸虛滑收澀仍將正氣提治泄瀉用生薑一塊艾一把水煎熱服一方治暴瀉痢用百草霜末每二錢米飲調下一方治暴瀉不止小便不通用車前子炒為末每二錢米飲調服其根葉亦可搗汁飲下此藥利水道而不動元氣一方治泄瀉不拘新久用白朮一兩黃土炒入米一撮同煎空心服一方用五倍子末南棗肉搗為丸大人二三十丸小兒十五丸熟水送下一方治水瀉用五倍子末水調服一方治水瀉用白礬五倍子等分麵糊丸如梧桐子大每三十五丸空心白滾水下一方治脾泄瀉久有熱者用黃連一兩生薑四兩俱切碎用慢火同炒待姜枯取去姜將黃連為細末每服二錢空心米湯服一方治脾瀉久有寒者用肉豆蔻一個剜竅入乳香少許麵裹煨去面為末作一服空心陳米湯送下一方治久瀉不止飲食不進用黃米炒為末每數匙用砂糖調吃一方治久瀉用糯米為末入百草霜十分之二水和為餅烙熟食之一法單用糯米半生半炒煮粥食之一方治久瀉久痢或脫肛下墜等症用臭椿根白皮酒炒七次為末阿膠化開為丸如梧桐子大每三五十丸米湯送下一方治久瀉肌瘦不思飲食用白朮去蘆油半斤土炒乾山藥四兩為末每日煮粥放一合在內再煮滾空心食之凡飯後隨即大便者蓋脾腎交濟所以有水穀之分脾氣雖強而腎氣不足故飲食下咽而大腑為之飧泄也治法用破故紙四兩酒炒肉豆蔻二兩生共為末用生薑四兩切片煮棗四十九枚去皮核取肉為丸如梧桐子大每服三五十丸空心鹽湯送下使脾腎之氣交通則水穀自然克化此所謂妙合而凝者也一方治泄及小便頻多