蟆四五個胡椒一歲一粒同入肚內水煮爛去椒蟆食肚飲汁忌鹽百日一方用粟米緑豆各一抄豬肚一葉切碎三味煮作粥食之至重者不過五次其腫自消切忌氣惱生冷之物一方治氣脹鼓脹水脹用羯雞屎一升瓦上炒焦地上出火毒研細以百沸湯三升淋汁濾過每服一大盞用木香檳榔末各一錢日三服以平為期一方治腫脹用紅芽大戟一升紅棗三升水煮一日夜去大戟用棗曬乾食之一方用白商陸根搗汁一合生薑汁一點黃酒一盞空心和服二日服一次元氣厚服五次薄者三次止忌鹽醬凡人五十以內者可服五十以外者不必服一方治因氣吃水渾身腫脹用蛾殼七個桑柴火燒灰加枯礬一錢核桃仁二個燒存性共為末滾緑豆湯送下被蓋出汗忌腥冷吃白飯一方治水病肚脹四肢腫用王瓜一個破二片不去子醋煮一半水煮一半俱爛空心頓服須臾水下積聚積有五種聚有六五臟六腑各所屬左血右氣中食痰慢慢消溶毋欲速治初覺有積用蘿蔔切如麵條半盞熟油半盞二味同炒黃色入水二盞煎至一盞連蘿蔔空心溫服通後以米湯調養一方治積塊用大黃為末好釅醋慢火熬膏子為丸如梧桐子大每五七十丸量虛實大小休吃晚飯用好墨磨濃好酒送下次日見膿一方治酒積面黃黑色腹脹不消用甘遂末一錢槽頭豬肉一兩細切如泥將遂末和勻作一塊紙裹煨令香取出細嚼酒下臨臥取下酒布袋為妙一方治鱉瘕伏在心下手揣見頭足時時轉動用白雌雞一隻不要餵食一宿天明以豬脂煎飯喂之出其屎無問多少放於銅器中以溺和火上熬干為末白湯調服方寸匕日四五服須消盡乃止常餵雞取屎好了殺雞單食之一方治食瘕酒癖血瘕氣塊時發刺痛及積滯不消心腹堅脹痰逆嘔噦用三稜莪朮各四兩芫花二兩三味同入磁罐內用米醋五升浸封罐口以灰煨令乾卻取出稜莪將芫花以余醋炒令焦乾同為末醋糊丸如緑豆大每服十五丸薑湯桑白皮湯下一方化五積破六聚除癥瘕消痃癖及一切積塊不分左右上中下不論遠近及男女小兒用南香附米一斤分四份一份醋浸一份童便浸一份紅花煎汁浸一份梔子煎汁浸各浸三日共合一處曬乾炒熱入乾漆為末四兩同香附炒煙盡吹去漆灰稱香附一斤足加當歸酒浸炒乾六兩山楂四兩連核焙乾用蘿蔔子炒搗頭末二兩海粉洗日乾二兩共為末醋糊為丸如緑豆大每百丸食遠茶下如脾胃虛白朮湯下五疸五疸總是濕與熱遍身發黃小便血清熱利水濕自除但將此治無他說治黃腫用皂礬半斤炒過雄黃一錢為末先以三指撮一劑次以四指撮一劑又以五指撮一劑入面加鹽花椒末芝麻三次烙干餅食之從腿肚中去黃水大效一方治黃病用黑礬火煅人參一錢雞內金一錢共為末棗肉丸如梧桐子大每二十丸黃酒下一方治黃病腹中積塊用黑礬四兩火煅三稜莪朮各一兩半丁香木香各二錢共為末酒糊為丸茶酒任下一方治黃胖用香附子一斤黑礬半斤罐內煅為末醋糊為丸如梧桐子大曬乾炒黑每五七十丸茶下一方治黃病好吃壁泥用好泥一斤砂糖四兩和泥炒乾為細末黃連膏為丸如梧桐子大每五六十丸空心糖湯下一方治酒疸食鱉不拘多寡烹熟如常食至數個愈一方治面黃用甜瓜蒂為末口內噙水吹兩鼻流黃水一二日見效一方治黃疸用絲瓜連子燒灰為末因面得病麵湯下因酒得病酒調服數服可愈補益補益諸虛莫盡詳血虛補血正相當氣虛補氣無差謬氣血俱虛並補良治氣虛用人參白朮白茯苓甘草薑棗煎服血虛用川芎當歸白芍熟地黃水煎服氣血兩虛用以上二方合作劑服之一方治諸虛百損五勞七傷用人乳二盞好酒半盞入銀鏇或錫器內頓服每日五更一服一方治諸虛勞瘵取室女經血或首經最佳以綿帛收之陰乾入乳香末少許乳汁和丸如櫻桃大每噙一粒取女人氣一口乳汁送下一方治諸虛括曰神仙發祕機濟世功無比只此小靈丹妙奪陰陽理半斤陰煉石配入首男乳日夜配天中卻從夏至始日月入紅鉛直至中秋止色如桃花鮮嚊鼻香甘美日服一分半送以華池水服之至七日體熱何足畏時進蟠桃酒藉以濕靈氣漸至一年餘頓覺超凡類肌體潤且澤延年立人世制陰煉秋石法收童男女便各數石合一處注磁器內每便二斗皂角水少許攪數千轉澄久仄去浮清又入水攪澄如前凡八九次待其濁無鹹味色白方取紙上滲干每半斤入好人乳曬至一斤紅鉛不拘多少每日五更時服一方治衰瘦幾死者取室女二十上下氣血雄壯無病者月經一盞二三次取和男童之母乳半盞和之於淨室中服之後熱作渴不可飲茶湯酒取少壯婦人有乳者飲其乳經旬至一月後方可食煙火食忌氣與神動心疲如發再不能治矣其乳母須以爛豬蹄食之痼冷即陰證痼冷寒甚即陰證手足厥冷心腹痛外腎縮入死須臾急將溫熱藥來用治陰證手足厥冷心腹卒痛用好酒一壺極滾將雞刺血入壺中極熱飲之被蓋出汗男用雄女用雌雞隨量飲一方用枯礬末衆口唾調於患者手心合掌擦片時曲膝間夾之汗出為度一方用魚鰾一根燒存性胡椒四十九粒為末黃酒度下一方用舊胡綿頭髮二味燒存性各五分香油調稀一服立應一方用硫黃四分胡椒六分為末每三分燒酒調服一方用芥菜子炒為末釅醋調為餅放臍上用絹帛緊縛一方用鉛丹一錢白礬八分胡椒二分為末用醋調搭玉莖頭上女人放玉門上男左女右使藥一方用生蔥一束以繩扎如杯大切去根葉留二寸以火熁一面令熱著臍下外以尉斗尉之令熱透中更作三四餅壞則易之俟病人手溫有汗為愈一方燒熱火磚噴以醋紙包入被中熏之或燒熱瓦噴醋紙包尉胸背四肢皆妙一方用黑豆不拘多少鍋內炒熟乘熱以好酒淬之就以碗蓋勿令泄氣候溫飲酒一方用馬蜂窩為末蔥白一根搗為膏貼在手心陰汗出效勞瘵勞瘵陰虛相火動午後發熱痰咳重滋陰降火補脾虛治標固本無不中治陰虛火動蒸熱如燎諸藥投之不能退熱用無病壯盛童子小便色白者乘熱服之不數服而熱退矣痰嗽盛加竹瀝薑汁少許同服一方治陰虛火盛五心煩熱用人中白一兩黃柏鹽灑炒青黛生甘草各五錢為末每二錢童便調服一方治勞嗽發熱吐痰用鍾乳粉一錢緑豆粉一錢半生薑三片連須蔥白三根俱搗用牙豬肺管一條不見水將藥入管內兩頭線扎住用水三碗炒鍋內煮熟細嚼咽下其湯亦飲之一方治虛勞痰嗽用白糖蜜蘿蔔汁薑汁藕汁雪梨汁人乳汁各半斤柿霜二兩共合一處用金銀器重湯煎熬成膏磁器亦可日服二次一方治虛勞咳嗽吐血或傷力吐痰不出咳則連聲不絶用天花粉一兩楝參五錢為末每服二三錢麥門冬湯調服治勞瘵虛怯痰嗽汗熱用紫河車一具男用男胎女用女胎取首胎者佳用長流水洗令淨入砂鍋內慢火蒸熟花椒末鹽花少許食之此真元氣也大有殊效不能盡述一方治凡得傳尸勞瘵氣血未盡虛損元氣未脫者用川椒二斤去目併合口者炒出汗取淨椒研取紅皮末白膜去之每服二錢空心米湯調下須痹悶少頃如不能禁即以酒糊為丸如梧桐子大每空心酒下或米湯下二三十丸漸加至八九十丸一婦人用椒二分苦楝根皮一分丸服尸蟲從大便中出一方治勞蟲用癸亥日灸兩腰眼低陷中之穴每穴灸艾七炷若九炷十一炷尤好先隔日前點穴方睡至半夜子時一交癸亥日期便灸其蟲從大便中出即用火燒之棄於江河中如有黑嘴者則其在內已傷人腎臟矣此不可治蟲宜謹避瘵有數蟲如蜈蚣如小蛇如蛤蟆如馬尾如亂絲如爛面如蒼蠅如壁油蟲上紫下白形鋭足細而有口或如白蟻孔竅中皆出此皆勞瘵根毒若傳三人則如人形如鬼狀
